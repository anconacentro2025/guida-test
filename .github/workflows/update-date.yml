name: Update Release Date

on:
  push:
    paths:
      - 'index.html'
      - 'sw.js'
      - 'manifest.json'

jobs:
  update-date:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Update timestamp
        run: |
          CURRENT_DATE=$(TZ='Europe/Rome' date +'%d/%m/%y %H:%M')
          sed -i "s|\d{2}/\d{2}/\d{2} \d{2}:\d{2}|$CURRENT_DATE|g" index.html
          
      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add index.html
          git diff --staged --quiet || git commit -m "Auto-update timestamp"
          git push
