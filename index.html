<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Ancona Centro · Guida Ospiti</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,400&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
/* ============================================================
   VARIABILI — tema blu scuro / bianco / oro
   ============================================================ */
:root {
  --navy:      #0B1F33;
  --navy-2:    #163350;
  --navy-3:    #1E4A70;
  --gold:      #C8A45A;
  --gold-2:    #E2C07A;
  --gold-3:    #F5E6C0;
  --white:     #FFFFFF;
  --bg:        #F3F0EA;
  --bg-2:      #EAE6DD;
  --muted:     #6B7280;
  --text:      #1A2332;
  --border:    rgba(200,164,90,.22);
  --shadow:    0 2px 16px rgba(11,31,51,.10);
  --shadow-lg: 0 6px 32px rgba(11,31,51,.16);
}
/* ============================================================
   RESET & BASE
   ============================================================ */
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{scroll-behavior:smooth}
body{
  font-family:'Outfit',sans-serif;
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
  overflow-x:hidden;
  -webkit-font-smoothing:antialiased;
}
a{color:inherit;text-decoration:none}
button{font-family:'Outfit',sans-serif;cursor:pointer}

/* ============================================================
   HEADER
   ============================================================ */
.header{
  background:var(--navy);
  color:var(--white);
  position:sticky;top:0;z-index:200;
  box-shadow:0 2px 20px rgba(0,0,0,.30);
}
.header-inner{
  display:flex;align-items:center;justify-content:space-between;
  padding:13px max(28px, calc(env(safe-area-inset-left, 0px) + 18px));
  padding-left:max(28px, calc(env(safe-area-inset-left, 0px) + 18px));
  padding-right:max(28px, calc(env(safe-area-inset-right, 0px) + 18px));
  border-bottom:1px solid rgba(200,164,90,.18);
}
.header-brand{}
.header-title{
  font-family:'Cormorant Garamond',serif;
  font-size:1.25rem;font-weight:600;line-height:1.15;
  color:var(--white);
}
.header-sub{
  font-size:.65rem;font-weight:300;opacity:.6;
  letter-spacing:.1em;text-transform:uppercase;margin-top:1px;
}
.lang-toggle{
  display:flex;
  background:rgba(255,255,255,.08);
  border-radius:22px;overflow:hidden;
  border:1px solid rgba(200,164,90,.30);
}
.lang-btn{
  padding:5px 11px;font-size:.68rem;font-weight:500;
  border:none;background:transparent;color:rgba(255,255,255,.55);
  transition:all .2s;
}
.lang-btn.active{background:var(--gold);color:var(--navy);font-weight:600;}

/* ============================================================
   HERO BANNER
   ============================================================ */
.hero{
  width:100%;height:320px;overflow:hidden;position:relative;
  background:linear-gradient(160deg,var(--navy) 0%,var(--navy-2) 50%,var(--navy-3) 100%);
  transition:height .3s ease;
}
.hero.section-mode{height:68px;}
.hero-img{
  width:100%;height:100%;object-fit:cover;display:block;
  opacity:.55;
}
.hero-overlay{
  position:absolute;inset:0;
  background:rgba(11,31,51,.45);
  pointer-events:none;
}
.hero-caption{
  position:absolute;inset:0;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  color:var(--white);text-align:center;padding:0 24px;
}
.hero-caption-title{
  font-family:'Cormorant Garamond',serif;
  font-size:2.4rem;font-weight:600;
  line-height:1.1;letter-spacing:.02em;
  text-shadow:0 2px 12px rgba(0,0,0,.65);
  color:var(--white);
}
.hero-caption-gold{
  display:block;width:60px;height:2px;
  background:var(--gold);margin:10px auto 8px;
  border-radius:2px;
}
.hero-caption-sub{
  font-size:.72rem;font-weight:400;opacity:.85;
  letter-spacing:.14em;text-transform:uppercase;
  text-shadow:0 1px 6px rgba(0,0,0,.5);
}
.hero.section-mode .hero-caption{display:none;}

/* ============================================================
   GOLD DIVIDER
   ============================================================ */
.gold-bar{height:2px;background:linear-gradient(90deg,transparent,var(--gold),transparent);}

/* ============================================================
   NAV PILLS
   ============================================================ */
.nav-scroll{
  display:flex;gap:7px;padding:11px 16px;
  overflow-x:auto;background:var(--navy-2);
  -webkit-overflow-scrolling:touch;scrollbar-width:none;white-space:nowrap;
}
.nav-scroll::-webkit-scrollbar{display:none;}
.nav-pill{
  flex-shrink:0;padding:6px 13px;border-radius:22px;
  font-size:.68rem;font-weight:500;
  border:1.5px solid rgba(200,164,90,.35);
  background:transparent;color:rgba(255,255,255,.60);
  transition:all .2s;white-space:nowrap;
}
.nav-pill.active{background:var(--gold);border-color:var(--gold);color:var(--navy);font-weight:600;}
.nav-pill:active{transform:scale(.95);}

/* ============================================================
   HOME GRID
   ============================================================ */
.home-welcome{
  padding:20px 16px 12px;
  background:var(--white);
  border-bottom:1px solid var(--bg-2);
}
.home-checkin-grid{
  display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px;
}
.checkin-tile{
  background:var(--bg);border-radius:10px;padding:10px 12px;
  border:1px solid var(--border);
}
.checkin-label{font-size:.6rem;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:2px;}
.checkin-val{font-size:.9rem;font-weight:600;color:var(--navy);}

/* Box Social (sostituisce Wi-Fi) */
.home-social{
  background:linear-gradient(135deg,var(--navy) 0%,var(--navy-2) 100%);
  border-radius:10px;padding:10px 14px;margin-top:8px;
  display:flex;align-items:center;justify-content:space-between;
  border:1px solid rgba(200,164,90,.25);
  color:var(--white);
}
.home-social-label{color:rgba(255,255,255,.6);font-size:.65rem;text-transform:uppercase;letter-spacing:.08em;}
.home-social-links{display:flex;gap:14px;align-items:center;}
.home-social-link{
  color:var(--gold-2);font-size:.85rem;font-weight:500;
  display:flex;align-items:center;gap:4px;
  transition:color .2s;
}
.home-social-link:hover{color:var(--gold-3);}
.home-social-link:active{color:var(--gold);}

.nav-grid{
  display:grid;grid-template-columns:1fr 1fr;gap:10px;
  padding:14px 16px 20px;
}
.nav-tile{
  background:var(--white);border-radius:14px;padding:16px 14px;
  border:1px solid var(--border);box-shadow:var(--shadow);
  display:flex;flex-direction:column;align-items:flex-start;gap:6px;
  transition:transform .15s,box-shadow .15s;
  border-left:3px solid var(--gold);
}
.nav-tile:active{transform:scale(.97);box-shadow:none;}
.nav-tile-icon{font-size:1.4rem;line-height:1;}
.nav-tile-label{font-size:.8rem;font-weight:500;color:var(--navy);line-height:1.2;}

/* ============================================================
   SECTION HEADER
   ============================================================ */
.section-header{
  background:var(--navy);padding:16px 18px 14px;
  border-bottom:2px solid var(--gold);
}
.section-header-inner{display:flex;align-items:center;gap:12px;}
.section-icon{
  width:42px;height:42px;border-radius:10px;
  display:flex;align-items:center;justify-content:center;font-size:1.2rem;
  background:rgba(200,164,90,.18);flex-shrink:0;
}
.section-title{
  font-family:'Cormorant Garamond',serif;
  font-size:1.4rem;font-weight:600;color:var(--white);line-height:1.1;
}
.section-sub{font-size:.68rem;color:rgba(255,255,255,.5);margin-top:2px;letter-spacing:.05em;}

/* ============================================================
   CARDS CONTAINER
   ============================================================ */
.cards{padding:14px 14px 0;display:flex;flex-direction:column;gap:10px;}

/* ============================================================
   GENERIC CARD
   ============================================================ */
.card{
  background:var(--white);border-radius:13px;overflow:hidden;
  box-shadow:var(--shadow);border:1px solid rgba(0,0,0,.05);
}
.card-header{
  padding:12px 14px;display:flex;align-items:center;gap:10px;
  background:linear-gradient(135deg,var(--navy) 0%,var(--navy-2) 100%);
  border-bottom:1px solid var(--border);
}
.card-header-icon{font-size:1rem;}
.card-title{font-weight:500;font-size:.85rem;color:var(--white);}
.card-body{padding:12px 14px 14px;font-size:.82rem;line-height:1.6;color:var(--text);}
.card-body p{margin:0;}
.card-body a{color:var(--navy-3);font-weight:500;text-decoration:underline;text-decoration-color:rgba(30,74,112,.3);}

/* ============================================================
   MAP + PLACE LIST
   ============================================================ */
.map-list-wrap{
  display:flex;height:340px;border-radius:13px;overflow:hidden;
  border:1px solid var(--border);box-shadow:var(--shadow);
}
.section-map-el{flex:1;min-width:0;z-index:1;}
.place-btn-col{
  width:142px;overflow-y:auto;padding:5px 5px;
  display:flex;flex-direction:column;gap:4px;
  background:var(--white);border-left:1px solid var(--bg-2);
  -webkit-overflow-scrolling:touch;scrollbar-width:thin;
}
.place-btn-col::-webkit-scrollbar{width:3px;}
.place-btn-col::-webkit-scrollbar-thumb{background:var(--bg-2);border-radius:3px;}
.place-btn-mini{
  width:100%;text-align:left;padding:7px 8px;border-radius:8px;
  border:1px solid var(--bg-2);background:transparent;
  font-size:.65rem;color:var(--text);line-height:1.3;
  white-space:normal;transition:all .15s;
}
.place-btn-mini.selected,
.place-btn-mini:active{background:var(--navy);color:var(--white);border-color:var(--navy);}

/* Leaflet marker */
.map-marker-num{
  width:24px;height:24px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  background:var(--navy);border:2px solid var(--white);
  color:var(--white);font-family:'Outfit',sans-serif;
  font-size:10px;font-weight:700;
  box-shadow:0 2px 8px rgba(0,0,0,.40);
}
.map-marker-num.selected{background:var(--gold);color:var(--navy);transform:scale(1.25);z-index:999!important;}

/* ============================================================
   PLACE DETAIL
   ============================================================ */
.back-btn{
  display:inline-flex;align-items:center;gap:5px;
  background:none;border:none;color:var(--navy-3);
  font-size:.82rem;font-weight:500;padding:6px 0 4px;
}
.back-btn:active{opacity:.6;}
.detail-photo-wrap{
  width:100%;height:200px;overflow:hidden;position:relative;
  background:var(--bg-2);
}
.detail-photo{
  width:100%;height:100%;object-fit:cover;
  opacity:0;transition:opacity .4s;display:block;
}
.detail-photo.loaded{opacity:1;}
.detail-photo-placeholder{
  position:absolute;inset:0;
  display:flex;align-items:center;justify-content:center;
  font-size:2.5rem;
  background:linear-gradient(135deg,var(--bg-2),var(--bg));
  transition:opacity .3s;
  flex-direction:column;
  gap:6px;
}
.detail-photo-placeholder.hidden{opacity:0;pointer-events:none;}
/* Link segnaposto foto (quando non c'è immagine) */
.detail-photo-link{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  width:100%;height:100%;text-decoration:none;color:inherit;
}
.placeholder-emoji{font-size:2.5rem;margin-bottom:4px;}
.placeholder-text{font-size:0.75rem;font-weight:500;color:var(--navy-3);text-align:center;}

.place-card{
  background:var(--white);border-radius:13px;overflow:hidden;
  box-shadow:var(--shadow);border:1px solid var(--border);
}
.place-body{padding:12px 14px;display:flex;align-items:flex-start;gap:10px;}
.place-emoji-sm{font-size:1.1rem;min-width:22px;margin-top:2px;}
.place-name{font-weight:600;font-size:.9rem;margin-bottom:2px;color:var(--navy);}
.place-desc{font-size:.77rem;color:var(--muted);line-height:1.45;}
.place-dist{font-size:.68rem;color:var(--gold);font-weight:600;margin-top:4px;}
.place-actions{padding:0 14px 12px;display:flex;flex-wrap:wrap;gap:6px;}
.map-button{
  display:inline-block;font-size:.68rem;
  color:var(--navy);background:var(--bg);
  padding:4px 10px;border-radius:16px;
  border:1px solid var(--border);font-weight:500;
}
.map-button:active{background:var(--bg-2);}
.detail-nav{
  display:flex;justify-content:space-between;align-items:center;
  padding:8px 2px 4px;
}
.nav-detail-btn{
  background:var(--navy);color:var(--white);
  border:none;padding:8px 16px;border-radius:20px;
  font-size:.75rem;font-weight:500;transition:background .15s;
}
.nav-detail-btn:active{background:var(--navy-3);}
.detail-counter{font-size:.70rem;color:var(--muted);}

/* ============================================================
   CONTACT / EMERGENCY
   ============================================================ */
.contact-card{
  background:linear-gradient(135deg,var(--navy) 0%,var(--navy-2) 100%);
  border-radius:13px;padding:20px;color:var(--white);text-align:center;
  border:1px solid rgba(200,164,90,.20);
}
.contact-label{font-size:.65rem;text-transform:uppercase;letter-spacing:.1em;opacity:.5;}
.contact-number{
  font-family:'Cormorant Garamond',serif;
  font-size:1.8rem;font-weight:600;color:var(--gold-2);
  margin:10px 0 12px;letter-spacing:.04em;
}
.contact-btns{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-bottom:10px;}
.btn-wa{
  display:inline-flex;align-items:center;gap:6px;
  background:#25D366;color:var(--white);
  padding:9px 18px;border-radius:24px;font-size:.8rem;font-weight:500;
  text-decoration:none;
}
.btn-call{
  display:inline-flex;align-items:center;gap:6px;
  background:rgba(255,255,255,.15);color:var(--white);
  padding:9px 18px;border-radius:24px;font-size:.8rem;font-weight:500;
  text-decoration:none;border:1px solid rgba(255,255,255,.2);
}
.contact-email{font-size:.78rem;opacity:.65;margin-top:6px;}
.contact-email a{color:var(--gold-2);}
.emerg-card{
  background:var(--white);border-radius:13px;overflow:hidden;
  margin-top:10px;box-shadow:var(--shadow);border:1px solid var(--border);
}
.emerg-row{
  display:flex;align-items:center;padding:12px 14px;gap:12px;
  border-bottom:1px solid var(--bg-2);
}
.emerg-row:last-child{border-bottom:none;}
.emerg-num{
  font-size:.8rem;font-weight:700;color:var(--navy-3);
  min-width:110px;
}
.emerg-desc{font-size:.8rem;color:var(--text);}

/* ============================================================
   INFO ROWS (regole)
   ============================================================ */
.rule-row{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--bg-2);}
.rule-row:last-child{border-bottom:none;}
.rule-icon{font-size:1.1rem;}
.rule-text{font-size:.8rem;line-height:1.4;}

/* ============================================================
   TOAST
   ============================================================ */
.toast{
  position:fixed;bottom:80px;left:50%;
  transform:translateX(-50%) translateY(16px);
  background:var(--navy);color:var(--white);
  padding:10px 20px;border-radius:22px;
  font-size:.8rem;opacity:0;transition:all .3s;
  z-index:500;white-space:nowrap;
  border:1px solid rgba(200,164,90,.3);
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* ============================================================
   FOOTER / BOTTOM HOME BTN
   ============================================================ */
.goto-home{display:flex;justify-content:center;margin:20px 0 30px;}
.home-btn{
  background:var(--navy);color:var(--white);border:none;
  padding:10px 22px;border-radius:30px;font-size:.78rem;font-weight:500;
  display:inline-flex;align-items:center;gap:8px;
  box-shadow:var(--shadow);
}
.home-btn:active{transform:scale(.95);}
.copyright-footer{
  text-align:center;padding:12px 16px;
  font-size:.62rem;color:var(--muted);
  border-top:1px solid var(--bg-2);margin-top:8px;
}
.content{padding-bottom:40px;}

/* ============================================================
   ANIMAZIONI
   ============================================================ */
@keyframes fadeUp{
  from{opacity:0;transform:translateY(10px);}
  to{opacity:1;transform:translateY(0);}
}
.section{display:none;}
.section.active{display:block;animation:fadeUp .28s ease;}

/* ============================================================
   LINK UTILI CARD
   ============================================================ */
.link-row{
  display:flex;align-items:center;gap:12px;
  padding:10px 14px;border-bottom:1px solid var(--bg-2);
}
.link-row:last-child{border-bottom:none;}
.link-icon{font-size:1.2rem;min-width:24px;}
.link-info{flex:1;}
.link-name{font-size:.82rem;font-weight:500;color:var(--navy);}
.link-desc{font-size:.7rem;color:var(--muted);margin-top:1px;}
.link-action{
  font-size:.68rem;color:var(--navy-3);
  background:var(--bg);padding:4px 9px;border-radius:14px;
  border:1px solid var(--border);white-space:nowrap;
}
</style>
</head>
<body>

<!-- ============================================================
     HEADER
     ============================================================ -->
<header class="header">
  <div class="header-inner">
    <div class="header-brand">
      <div class="header-title">Affittacamere<br>Ancona Centro</div>
      <div class="header-sub" id="header-sub">Guest Guide · Piazza Roma 3</div>
    </div>
    <div class="lang-toggle" role="radiogroup" aria-label="Selezione lingua">
      <button class="lang-btn active" onclick="setLang('it')" id="btn-it" role="radio" aria-checked="true" aria-label="Italiano">IT</button>
      <button class="lang-btn" onclick="setLang('en')" id="btn-en" role="radio" aria-checked="false" aria-label="English">EN</button>
      <button class="lang-btn" onclick="setLang('pl')" id="btn-pl" role="radio" aria-checked="false" aria-label="Polski">PL</button>
    </div>
  </div>
</header>

<!-- ============================================================
     HERO BANNER
     ============================================================ -->
<div class="hero" id="hero">
  <img class="hero-img" id="heroImg"
       src="https://raw.githubusercontent.com/anconacentro2025/Guida-1.7/main/img/home.jpg"
       alt="Ancona Centro" onerror="this.style.display='none'">
  <div class="hero-overlay" aria-hidden="true"></div>
  <div class="hero-caption">
    <div class="hero-caption-title">Affittacamere<br>Ancona Centro</div>
  </div>
</div>
<div class="gold-bar" aria-hidden="true"></div>

<!-- ============================================================
     NAV PILLS (visibili solo dentro una sezione)
     ============================================================ -->
<nav class="nav-scroll" id="nav" style="display:none;" role="navigation" aria-label="Sezioni"></nav>

<!-- ============================================================
     MAIN CONTENT
     ============================================================ -->
<main class="content" id="content" role="main"></main>

<div class="copyright-footer">© 2026 Affittacamere Ancona Centro · Guida V3.0 · All rights reserved</div>
<div class="toast" id="toastEl" role="alert" aria-live="polite"></div>

<!-- ============================================================
     LEAFLET + LOGICA
     ============================================================ -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
/* ============================================================
   STATO GLOBALE
   ============================================================ */
var currentLang         = 'it';
var currentSection      = -1;   // -1 = home
var currentPlaceDetail  = -1;   // -1 = mappa lista
var currentSectionPlaces = [];
var leafletMap          = null;

/* ============================================================
   COSTANTI
   ============================================================ */
var HOST_PHONE = '3356750269';
var HOST_EMAIL = 'anconacentro@yahoo.com';
var PHOTO_BASE = 'https://raw.githubusercontent.com/anconacentro2025/Guida-1.7/main/img/';

/* ============================================================
   LINGUA — funzione tr() statica
   ============================================================ */
function tr(it, en, pl){
  if (currentLang === 'it') return it;
  if (currentLang === 'en') return en || it;
  if (currentLang === 'pl') return pl || it;
  return it;
}

function setLang(lang){
  currentLang = lang;
  ['it','en','pl'].forEach(function(l){
    document.getElementById('btn-'+l).classList.toggle('active', l===lang);
    document.getElementById('btn-'+l).setAttribute('aria-checked', l===lang ? 'true' : 'false');
  });
  renderAll();
}

/* ============================================================
   UTILITY
   ============================================================ */
function showToast(msg){
  var el = document.getElementById('toastEl');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(function(){ el.classList.remove('show'); }, 3000);
}

function getMapLink(query){
  return 'https://www.google.com/maps/search/?api=1&query='+encodeURIComponent(query+', Ancona Italia');
}

// Fallback quando una foto locale non si carica
function photoFallback(wrapId, name){
  var el = document.getElementById(wrapId);
  if(el){
    var q = encodeURIComponent(name + ' Ancona');
    el.innerHTML = '<a href="https://www.google.com/search?tbm=isch&q='+q+'" target="_blank" class="detail-photo-link" aria-label="Cerca foto di '+name+' su Google Immagini">'
    +'<span class="placeholder-emoji" aria-hidden="true">🖼️</span>'
    +'<span class="placeholder-text">'+tr('Clicca per vedere le foto','Click to see photos','Kliknij, aby zobaczyć zdjęcia')+'</span>'
    +'</a>';
  }
}

/* ============================================================
   DATI APPARTAMENTO
   ============================================================ */
var appData = {
  checkin:  'da concordare / on request / do ustalenia',
  checkout: '11:00',
  address:  'Piazza Roma 3, 4° piano',
  rules: [
    { icon:'🚭',
      it:'Vietato fumare in tutto l\'appartamento',
      en:'No smoking anywhere in the apartment',
      pl:'Zakaz palenia w całym mieszkaniu' },
    { icon:'🐾',
      it:'Vietati gli animali domestici',
      en:'No pets allowed',

/* ============================================================
   NAVIGAZIONE
   ============================================================ */
function goTo(i){
  currentSection     = i;
  currentPlaceDetail = -1;
  if (leafletMap){ leafletMap.remove(); leafletMap = null; }
  renderAll();
  window.scrollTo({ top:0, behavior:'smooth' });
}

function selectPlaceDetail(i){
  currentPlaceDetail = i;
  if (leafletMap){ leafletMap.remove(); leafletMap = null; }
  renderAll();
  window.scrollTo({ top:0, behavior:'smooth' });
}

function backToMap(){
  currentPlaceDetail = -1;
  renderAll();
  window.scrollTo({ top:0, behavior:'smooth' });
}

/* ============================================================
   MAPPA LEAFLET
   ============================================================ */
function initSectionMap(){
  if (typeof L === 'undefined'){ setTimeout(initSectionMap, 300); return; }
  var el = document.getElementById('sectionMap');
  if (!el || !currentSectionPlaces.length) return;
  if (leafletMap){ leafletMap.remove(); leafletMap = null; }

  var valid = currentSectionPlaces.filter(function(p){ return p.lat && p.lng; });
  if (!valid.length) return;

  leafletMap = L.map('sectionMap', { zoomControl:true, attributionControl:false });
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom:19 }).addTo(leafletMap);
  L.control.attribution({ prefix:'© <a href="https://openstreetmap.org">OSM</a>' }).addTo(leafletMap);

  var bounds = [];
  valid.forEach(function(p){
    var idx = currentSectionPlaces.indexOf(p);
    var icon = L.divIcon({
      html:'<div class="map-marker-num" id="mkr-'+idx+'" aria-label="'+p.name+'">'+(idx+1)+'</div>',
      className:'', iconSize:[24,24], iconAnchor:[12,12], popupAnchor:[0,-14]
    });
    var m = L.marker([p.lat, p.lng], { icon:icon }).addTo(leafletMap);
    m.bindPopup('<b style="font-size:.78rem;">'+p.emoji+' '+p.name+'</b><br><span style="font-size:.68rem;color:#888;">'+p.dist+'</span>');
    m.on('click', function(){ selectPlaceDetail(idx); });
    bounds.push([p.lat, p.lng]);
  });
  leafletMap.fitBounds(bounds, { padding:[22,22] });
}

/* ============================================================
   RENDER PRINCIPALE
   ============================================================ */
function renderAll(){
  var hero = document.getElementById('hero');
  var nav  = document.getElementById('nav');
  var cont = document.getElementById('content');

  if (currentSection === -1 && leafletMap) {
    leafletMap.remove();
    leafletMap = null;
  }

  hero.classList.toggle('section-mode', currentSection !== -1);

  if (currentSection === -1){
    nav.style.display = 'none';
    cont.innerHTML = renderHome();
    return;
  }

  nav.style.display = 'flex';
  nav.innerHTML = sections.map(function(s,i){
    return '<button class="nav-pill'+(i===currentSection?' active':'')+'" onclick="goTo('+i+')" role="tab" aria-selected="'+(i===currentSection?'true':'false')+'">'
           +s.icon+' '+tr(s.it,s.en,s.pl)+'</button>';
  }).join('');

  var s = sections[currentSection];
  var body = renderSection(s.id);

  cont.innerHTML =
    '<section class="section active">'
    +'<div class="section-header"><div class="section-header-inner">'
    +'<div class="section-icon" aria-hidden="true">'+s.icon+'</div>'
    +'<div><div class="section-title">'+tr(s.it,s.en,s.pl)+'</div></div>'
    +'</div></div>'
    +'<div class="cards">'+body
    +'<div class="goto-home"><button class="home-btn" onclick="goTo(-1)" aria-label="Torna alla Home">🏠 Home</button></div>'
    +'</div></section>';

  if (currentPlaceDetail < 0){
    setTimeout(initSectionMap, 0);
  }
}

   ============================================================ */
function renderSection(id){
  if (id === 'contact')     return renderContact();
  if (id === 'rules')       return renderRules();
  if (id === 'transport')   return renderTransport();

  var map = {
    mustsee:      function(){ return appData.mustsee.slice().sort(function(a,b){ return a.order-b.order; }); },
    restaurants:  function(){ return appData.restaurants; },
    barpub:       function(){ return appData.barpub; },
    supermarkets: function(){ return appData.supermarkets; },
    parking:      function(){ return appData.parking; },
    around:       function(){ return appData.around; },
    marche:       function(){ return appData.marche; }
  };
  if (map[id]) return renderPlaceSection(map[id]());
  return '';
}

function renderPlaceSection(items){
  currentSectionPlaces = items;

  if (currentPlaceDetail >= 0 && currentPlaceDetail < items.length){
    return renderPlaceDetail(items[currentPlaceDetail], currentPlaceDetail, items.length);
  }

  var btns = items.map(function(p,i){
    return '<button class="place-btn-mini" onclick="selectPlaceDetail('+i+')" aria-label="'+p.name+'">'+(i+1)+'. '+p.name+'</button>';
  }).join('');

  return '<div class="map-list-wrap">'
    +'<div id="sectionMap" class="section-map-el" role="application" aria-label="Mappa dei luoghi"></div>'
    +'<div class="place-btn-col">'+btns+'</div>'
    +'</div>';
}

function renderPlaceDetail(p, index, total){

      +'onerror="photoFallback(\''+wrapId+'\', \''+p.name.replace(/'/g, "\\'")+'\')" loading="lazy">'
      +'</div>';

      +'</a></div>';
  }

  var btns = '<a href="'+getMapLink(p.mapQuery||p.name)+'" target="_blank" class="map-button" aria-label="Apri mappa per '+p.name+'">🗺️ '

    btns += ' <a href="'+getMapLink(p.extraMap.query)+'" target="_blank" class="map-button" aria-label="'+p.extraMap.label+'">'+p.extraMap.label+'</a>';

  var prev = index > 0
    ? '<button class="nav-detail-btn" onclick="selectPlaceDetail('+(index-1)+')" aria-label="Luogo precedente">◀ '+tr('Prec.','Prev','Poprz.')+'</button>'
    : '<span></span>';

    ? '<button class="nav-detail-btn" onclick="selectPlaceDetail('+(index+1)+')" aria-label="Luogo successivo">'+tr('Succ.','Next','Nast.')+' ▶</button>'

    +'</div></div>'
    +'<div class="place-actions">'+btns+'</div>'
