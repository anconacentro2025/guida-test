    const appData = {

            access: { it: 'Il citofono si trova a sinistra del portone. All\'arrivo suonare al campanello Frisoli.', en: 'The intercom is on the left of the main door. On arrival, ring the bell: Frisoli.', de: 'Die Gegensprechanlage befindet sich links vom Eingangstor. Bei der Ankunft klingeln bei Frisoli.', pl: 'Domofon znajduje się po lewej stronie bramy. Po przyjeździe zadzwonić na dzwonek Frisoli.' },
            keys: { it: 'Le chiavi saranno consegnate di persona all\'arrivo.', en: 'The keys will be given in person upon arrival.', de: 'Die Schlüssel werden bei der Ankunft persönlich übergeben.', pl: 'Klucze zostaną przekazane osobiście po przyjeździe.' },
            recycling: { it: 'I bidoni per la differenziata sono dietro il palazzo con l\'orologio, quello alla sinistra del portone.', en: 'The recycling bins are behind the building with the clock, the one on the left of the main door.', de: 'Die Mülltonnen für die Trennung befinden sich hinter dem Gebäude mit der Uhr, das links vom Eingangstor.', pl: 'Pojemniki do segregacji znajdują się za budynkiem z zegarem, tym po lewej stronie bramy.' },
            quietHours: { it: 'Rispettare il silenzio dalle 22:00 alle 08:00.', en: 'Quiet hours: 22:00 – 08:00.', de: 'Ruhezeiten: 22:00 – 08:00 Uhr.', pl: 'Zachowaj ciszę w godz. 22:00 – 08:00.' },
            checkin: { it: 'Check‑in flessibile: di norma dalle 15:00, ma è possibile concordare un orario diverso. Se arrivate prima e l\'alloggio non fosse pronto, potete lasciare i bagagli nell\'ingresso.', en: 'Flexible check‑in: normally from 15:00, but a different time can be arranged. If you arrive earlier and the accommodation is not ready, you can leave your luggage in the entrance.', de: 'Flexibler Check‑in: normalerweise ab 15:00 Uhr, aber eine andere Zeit kann vereinbart werden. Wenn Sie früher anreisen und die Unterkunft noch nicht bereit ist, können Sie Ihr Gepäck im Eingangsbereich abstellen.', pl: 'Elastyczne zameldowanie: zwykle od 15:00, ale można uzgodnić inną godzinę. Jeśli przyjedziesz wcześniej, a mieszkanie nie jest gotowe, możesz zostawić bagaż w wejściu.' },
            checkout: { it: 'Check‑out flessibile: di norma entro le 11:00. Se avete bisogno di trattenervi, ove non fosse possibile potete sempre lasciare i bagagli nell\'ingresso e tornare a prenderli più tardi. Lasciate le chiavi sull\'attaccapanni all\'ingresso.', en: 'Flexible check‑out: normally by 11:00. If you need to stay longer and it is not possible, you can always leave your luggage in the entrance and pick it up later. Leave the keys on the coat hook at the entrance.', de: 'Flexibler Check‑out: normalerweise bis 11:00 Uhr. Wenn Sie länger bleiben müssen und es nicht möglich ist, können Sie Ihr Gepäck jederzeit im Eingangsbereich abstellen und später abholen. Lassen Sie die Schlüssel am Garderobenhaken im Eingangsbereich.', pl: 'Elastyczne wymeldowanie: zwykle do 11:00. Jeśli potrzebujesz zostać dłużej, a nie jest to możliwe, zawsze możesz zostawić bagaż w wejściu i odebrać go później. Zostaw klucze na wieszaku przy wejściu.' }
        },
        rules: [

            { icon: '🐾', it: 'Vietati gli animali domestici', en: 'No pets allowed', de: 'Haustiere nicht erlaubt', pl: 'Zakaz wprowadzania zwierząt domowych' },
            { icon: '❄️', it: 'Condizionatore: spegnere quando si esce', en: 'Air conditioning: turn off when leaving', de: 'Klimaanlage: beim Verlassen ausschalten', pl: 'Klimatyzacja: wyłącz przy wyjściu' },
            { icon: '🪟', it: 'Assicurarsi che le persiane siano sempre bloccate, altrimenti in caso di vento può essere pericoloso.', en: 'Make sure the shutters are always secured; otherwise, in case of wind, it can be dangerous.', de: 'Stellen Sie sicher, dass die Fensterläden immer gesichert sind; sonst kann es bei Wind gefährlich werden.', pl: 'Upewnij się, że okiennice są zawsze zablokowane; w przeciwnym razie przy wietrze może to być niebezpieczne.' }
        ],
        social: { instagram: 'https://www.instagram.com/anconacentro', facebook: 'https://www.facebook.com/profile.php?id=61575688633462' },
        mustsee: [
            { order:1, name:'Fontana del Calamo (13 Cannelle)', emoji:'⛲', photo:'fontana-calamo.jpg', it:'Storica fontana pubblica simbolo della città detta anche delle 13 cannelle ricostruita nelle attuali forme rinascimentali a metà del 500. Una targa posta sul muro di fronte ricorda l\'adiacente Porta del Calamo, abbattuta dopo l\'unificazione d\'Italia nel 1860. Dalla Fontana del Calamo, o delle 13 Cannelle come la chiamano gli anconetani, si scende lungo Corso Mazzini e si arriva a Piazza della Repubblica, dove si affaccia il Teatro delle Muse.', en:'Historic public fountain, symbol of the city, also known as the 13 Cannelle, rebuilt in its current Renaissance form in the mid‑16th century. A plaque on the opposite wall recalls the adjacent Porta del Calamo, demolished after the unification of Italy in 1860. From the Fontana del Calamo, or "13 Cannelle" as the locals call it, walk down Corso Mazzini to Piazza della Repubblica, where the Teatro delle Muse stands.', de:'Historischer öffentlicher Brunnen, Wahrzeichen der Stadt, auch bekannt als die 13 Cannelle, wiederaufgebaut in der heutigen Renaissance-Form Mitte des 16. Jahrhunderts. Eine Gedenktafel an der gegenüberliegenden Wand erinnert an die angrenzende Porta del Calamo, die nach der Einigung Italiens 1860 abgerissen wurde. Von der Fontana del Calamo, oder "13 Cannelle" wie die Einheimischen sagen, geht man den Corso Mazzini hinunter zur Piazza della Repubblica, wo das Teatro delle Muse steht.', pl:'Historyczna fontanna publiczna, symbol miasta, zwana także 13 Cannelle, odbudowana w obecnej renesansowej formie w połowie XVI wieku. Tablica na przeciwległej ścianie przypomina o sąsiedniej Porta del Calamo, zburzonej po zjednoczeniu Włoch w 1860 roku. Od Fontana del Calamo, czyli "13 Cannelle" jak nazywają ją miejscowi, schodzimy w dół Corso Mazzini i docieramy na Piazza della Repubblica, gdzie znajduje się Teatro delle Muse.', dist:'📍 0 m – Punto di partenza', mapQuery:'Fontana delle 13 Cannelle Ancona', lat:43.6184165, lng:13.5129301 },
            { order:2, name:'Teatro delle Muse', emoji:'🎭', photo:'teatro-muse.jpg', it:'Teatro in stile neoclassico inaugurato nel 1827, danneggiato dalla seconda guerra mondiale e riaperto nel 2002. Dal Teatro delle Muse, prendendo via della Loggia, si arriva al Palazzo Benincasa e alla Loggia dei Mercanti.', en:'Neoclassical theatre inaugurated in 1827, damaged during World War II and reopened in 2002. From the Teatro delle Muse, take Via della Loggia to Palazzo Benincasa and the Loggia dei Mercanti.', de:'Neoklassizistisches Theater, 1827 eingeweiht, im Zweiten Weltkrieg beschädigt und 2002 wiedereröffnet. Vom Teatro delle Muse nehmen Sie die Via della Loggia zum Palazzo Benincasa und zur Loggia dei Mercanti.', pl:'Teatr neoklasyczny otwarty w 1827 roku, zniszczony podczas II wojny światowej i ponownie otwarty w 2002 roku. Z Teatro delle Muse, idąc Via della Loggia, docieramy do Palazzo Benincasa i Loggia dei Mercanti.', dist:'🚶 350 m – 4 min', mapQuery:'Teatro delle Muse Ancona', lat:43.6192483, lng:13.5099488 },
            { order:3, name:'Loggia dei Mercanti', emoji:'🏛️', photo:'loggia-mercanti.jpg', it:'Edificio quattrocentesco progettato da Giorgio da Sebenico (come l\'adiacente Palazzo Benincasa) destinato alla compravendita delle merci che arrivavano in città dal porto. Proseguendo poco oltre per via della Loggia si arriva alla Chiesa di Santa Maria della Piazza.', en:'15th‑century building designed by Giorgio da Sebenico (like the adjacent Palazzo Benincasa), used for the trading of goods arriving in the city from the port. Continuing a little further along Via della Loggia you reach the Church of Santa Maria della Piazza.', de:'Gebäude aus dem 15. Jahrhundert, entworfen von Giorgio da Sebenico (wie der angrenzende Palazzo Benincasa), genutzt für den Handel mit Waren, die aus dem Hafen in die Stadt kamen. Wenn Sie die Via della Loggia weitergehen, erreichen Sie die Kirche Santa Maria della Piazza.', pl:'XV‑wieczny budynek zaprojektowany przez Giorgio da Sebenico (podobnie jak sąsiedni Palazzo Benincasa), przeznaczony do handlu towarami przybywającymi do miasta z portu. Idąc nieco dalej wzdłuż Via della Loggia, docieramy do Kościoła Santa Maria della Piazza.', dist:'🚶 400 m – 5 min', mapQuery:'Loggia dei Mercanti Ancona', lat:43.6199818, lng:13.5098563 },
            { order:4, name:'Chiesa Santa Maria della Piazza', emoji:'⛪', photo:'santa-maria-piazza.jpg', it:'Eretta tra l\'XI e il XII secolo, è un pregevole esempio di stile romanico. Costruita su una chiesa paleocristiana del IV secolo fu restaurata nel VI. Una parte del pavimento della chiesa attuale è in vetro per permettere la visione dei mosaici paleocristiani sottostanti. Si accede al porto attraversando la Portella Santa Maria collocata proprio di fronte alla chiesa. Proseguendo sulla destra dopo 300 metri si raggiunge l\'Arco di Traiano.', en:'Built between the 11th and 12th centuries, it is a fine example of Romanesque style. Constructed on a 4th‑century early Christian church, it was restored in the 6th century. Part of the current church floor is made of glass to allow a view of the early Christian mosaics underneath. The port is accessed through Portella Santa Maria, located right opposite the church. Continuing to the right after 300 metres you reach the Arch of Trajan.', de:'Erbaut zwischen dem 11. und 12. Jahrhundert, ist es ein hervorragendes Beispiel romanischen Stils. Errichtet auf einer frühchristlichen Kirche aus dem 4. Jahrhundert, die im 6. Jahrhundert restauriert wurde. Ein Teil des heutigen Kirchenbodens ist aus Glas, um den Blick auf die darunter liegenden frühchristlichen Mosaike zu ermöglichen. Der Hafen wird durch die Portella Santa Maria betreten, die sich direkt gegenüber der Kirche befindet. Nach 300 Metern rechts erreichen Sie den Trajansbogen.', pl:'Zbudowany między XI a XII wiekiem, jest to znakomity przykład stylu romańskiego. Wzniesiony na wczesnochrześcijańskim kościele z IV wieku, został odrestaurowany w VI wieku. Część obecnej podłogi kościoła jest szklana, aby umożliwić oglądanie wczesnochrześcijańskich mozaik znajdujących się poniżej. Do portu wchodzi się przez Portella Santa Maria, znajdującą się dokładnie naprzeciwko kościoła. Idąc dalej w prawo po 300 metrach docieramy do Łuku Trajana.', dist:'🚶 400 m – 5 min', mapQuery:'Santa Maria della Piazza Ancona', lat:43.6205592, lng:13.5103676 },
            { order:5, name:'Arco di Traiano', emoji:'🏛️', photo:'arco-traiano.jpg', it:'Arco trionfale fatto costruire nel II secolo d.C. dal Senato romano per esprimere la propria riconoscenza all\'imperatore Traiano il quale aveva ampliato il porto di Ancona a proprie spese. Poco più avanti l\'Arco Clementino.', en:'Triumphal arch built in the 2nd century AD by the Roman Senate to express gratitude to Emperor Trajan, who had enlarged the port of Ancona at his own expense. A little further on, the Arco Clementino.', de:'Triumphbogen, erbaut im 2. Jahrhundert n. Chr. vom römischen Senat, um Kaiser Trajan zu danken, der den Hafen von Ancona auf eigene Kosten vergrößert hatte. Etwas weiter der Arco Clementino.', pl:'Łuk triumfalny wzniesiony w II wieku n.e. przez rzymski Senat, aby wyrazić wdzięczność cesarzowi Trajanowi, który na własny koszt rozbudował port w Ankonie. Nieco dalej Łuk Klementyński.', dist:'🚶 1150 m – 16 min', mapQuery:'Arco di Traiano Ancona', lat:43.6252706, lng:13.5066018 },
            { order:6, name:'Arco Clementino', emoji:'🚪', photo:'arco-clementino.jpg', it:'Monumento progettato nel XVIII secolo dall\'architetto Luigi Vanvitelli sotto forma di arco di trionfo a un solo fornice, in pietra d\'Istria, in onore di Papa Clemente XII che concesse alla città il "porto franco" dando un notevole impulso ai traffici marittimi.', en:'Monument designed in the 18th century by the architect Luigi Vanvitelli as a single-fornix triumphal arch in Istrian stone, in honour of Pope Clement XII, who granted the city "free port" status, giving a significant boost to maritime traffic.', de:'Monument aus dem 18. Jahrhundert, entworfen vom Architekten Luigi Vanvitelli als einbogiger Triumphbogen aus istrischem Stein, zu Ehren von Papst Clemens XII., der der Stadt den Status eines "Freihafens" verlieh und dem Seehandel großen Aufschwung gab.', pl:'Monument zaprojektowany w XVIII wieku przez architekta Luigiego Vanvitellego jako jednoprzęsłowy łuk triumfalny z kamienia istryjskiego, na cześć papieża Klemensa XII, który przyznał miastu status "wolnego portu", dając znaczący impuls dla ruchu morskiego.', dist:'🚶 1250 m – 17 min', mapQuery:'Arco Clementino Ancona', lat:43.6252604, lng:13.5049529 },
            { order:'6-bis', name:'Lanterna Rossa (facoltativo)', emoji:'🗼', photo:'lanterna-rossa.jpg', it:'(Facoltativo) Per chi vuole proseguire, andando poco avanti sulla destra, si attraversa un varco nelle mura e si arriva alla torre dei piloti del porto. Dietro di essa, poco visibile, una stretta apertura nelle mura conduce al molo in fondo al quale è collocata la lanterna rossa. Salendo per una scaletta si raggiunge la sommità del molo da dove si può ammirare uno splendido panorama sulla città e su tutta la costa.', en:'(Optional) For those who wish to continue, just ahead on the right, pass through a gap in the walls and reach the harbour pilots\' tower. Behind it, barely visible, a narrow opening in the walls leads to the pier where the red lantern stands. Climbing a short staircase you reach the top of the pier, from which you can admire a splendid view of the city and the entire coast.', de:'(Optional) Für diejenigen, die weitergehen möchten, gleich rechts durch eine Lücke in der Mauer gelangt man zum Turm der Hafenlotsen. Dahinter, kaum sichtbar, führt eine schmale Öffnung in der Mauer zum Pier, an dessen Ende die rote Laterne steht. Über eine kurze Treppe erreicht man die Spitze des Piers, von wo aus man einen herrlichen Blick auf die Stadt und die gesamte Küste hat.', pl:'(Opcjonalnie) Dla tych, którzy chcą kontynuować, nieco dalej po prawej stronie przechodzi się przez przejście w murach i dociera do wieży pilotów portowych. Za nią, ledwo widoczne, wąskie przejście w murach prowadzi na molo, na końcu którego znajduje się czerwona latarnia. Wspinając się po krótkich schodkach, można dotrzeć na szczyt mola, skąd można podziwiać wspaniały widok na miasto i całe wybrzeże.', dist:'🚶 2200 m – 29 min', mapQuery:'Lanterna Rossa Ancona', lat:43.6255485, lng:13.4942123 },
            { order:7, name:'Resti del Porto Romano (II sec. a.C.)', emoji:'🏛️', photo:'porto-romano.jpg', it:'Tornando indietro verso la città costeggiando Fincantieri, tenendosi sulla sinistra, si percorre una passerella sui resti dell\'antico porto romano. Sulla destra la Casa del Capitano del Porto del XIII sec. Proseguendo si raggiunge largo Dante Alighieri, su cui si affaccia l\'imponente Palazzo degli Anziani.', en:'Heading back towards the city along the Fincantieri shipyard, keeping to the left, you walk along a footbridge over the remains of the ancient Roman port. On the right, the 13th-century Harbour Master\'s House. Continuing, you reach Largo Dante Alighieri, where the imposing Palazzo degli Anziani stands.', de:'Zurück in Richtung Stadt entlang der Fincantieri-Werft, links halten, überquert man einen Steg über die Überreste des antiken römischen Hafens. Rechts das Haus des Hafenkapitäns aus dem 13. Jahrhundert. Weiter erreicht man den Largo Dante Alighieri, an dem der imposante Palazzo degli Anziani steht.', pl:'Wracając w kierunku miasta wzdłuż stoczni Fincantieri, trzymając się lewej strony, idziemy kładką nad pozostałościami starożytnego portu rzymskiego. Po prawej stronie Dom Kapitana Portu z XIII wieku. Kontynuując, docieramy do Largo Dante Alighieri, przy którym stoi okazały Palazzo degli Anziani.', dist:'🚶 800 m – 11 min', mapQuery:'Porto Traianeo Ancona', lat:43.6235224, lng:13.509572 },
            { order:8, name:'Palazzo degli Anziani e Ascensore', emoji:'🏛️', photo:'palazzo-anziani.jpg', it:'Sulla sinistra ascensore (con accesso a bagni pubblici) che porta fino a piazza Stracca, dove si trova l\'ingresso dell\'edificio. Sede storica delle Magistrature cittadine sin dall\'Alto Medioevo e a partire dall\'XI secolo, con la nascita della Repubblica di Ancona, luogo dove si riuniva il Consiglio degli Anziani, da cui prende il nome. Il Palazzo vanta origini antichissime e travagliate con la sua costruzione attribuita a Galla Placidia (governatrice dell\'impero) nel 425 d.C. L\'edificio attuale venne eretto nel 1270 su disegno di Margaritone d\'Arezzo e poi ristrutturato nel XVI sec. da Pellegrino Tibaldi. È attualmente sede del Consiglio comunale di Ancona. Continuando in leggera salita per via Pizzecolli si arriva a Palazzo Ferretti, sede del Museo Archeologico Nazionale delle Marche.', en:'On the left, a lift (with access to public toilets) takes you up to Piazza Stracca, where the entrance to the building is located. Historic seat of the city magistrates since the Early Middle Ages and, from the 11th century with the birth of the Republic of Ancona, meeting place of the Council of Elders (Consiglio degli Anziani), from which it takes its name. The palace boasts ancient and troubled origins, with its construction attributed to Galla Placidia (governor of the empire) in 425 AD. The current building was erected in 1270 to a design by Margaritone d\'Arezzo and later renovated in the 16th century by Pellegrino Tibaldi. It is now the seat of Ancona\'s City Council. Continuing slightly uphill along Via Pizzecolli you reach Palazzo Ferretti, home of the National Archaeological Museum of the Marche.', de:'Links ein Aufzug (mit Zugang zu öffentlichen Toiletten) bringt Sie zur Piazza Stracca, wo sich der Eingang des Gebäudes befindet. Historischer Sitz der städtischen Magistrate seit dem frühen Mittelalter und ab dem 11. Jahrhundert, mit der Geburt der Republik Ancona, Versammlungsort des Ältestenrates (Consiglio degli Anziani), von dem es seinen Namen hat. Der Palast hat antike und bewegte Ursprünge, sein Bau wird Galla Placidia (Statthalterin des Reiches) im Jahr 425 n. Chr. zugeschrieben. Das heutige Gebäude wurde 1270 nach einem Entwurf von Margaritone d\'Arezzo errichtet und später im 16. Jahrhundert von Pellegrino Tibaldi renoviert. Es ist heute Sitz des Stadtrats von Ancona. Leicht bergauf entlang der Via Pizzecolli erreicht man den Palazzo Ferretti, Sitz des Nationalen Archäologischen Museums der Marken.', pl:'Po lewej stronie winda (z dostępem do toalet publicznych) prowadzi na Piazza Stracca, gdzie znajduje się wejście do budynku. Historyczna siedziba miejskich magistratur od wczesnego średniowiecza, a od XI wieku, wraz z narodzinami Republiki Ankony, miejsce obrad Rady Starszych (Consiglio degli Anziani), od której pochodzi jego nazwa. Pałac ma starożytne i burzliwe dzieje – jego budowę przypisuje się Galli Placydii (namiestniczce cesarstwa) w 425 r. n.e. Obecny budynek wzniesiono w 1270 roku według projektu Margaritone d\'Arezzo, a następnie przebudowano w XVI wieku przez Pellegrina Tibaldiego. Obecnie jest siedzibą Rady Miejskiej Ankony. Kontynuując lekkim wzniesieniem wzdłuż Via Pizzecolli, docieramy do Palazzo Ferretti, siedziby Narodowego Muzeum Archeologicznego Marchii.', dist:'🚶 650 m – 9 min', mapQuery:'Palazzo degli Anziani Ancona', lat:43.6226783, lng:13.5105215, extraMap:{ label:'⬆️ Ascensore San Ciriaco', query:'Ascensore San Ciriaco Ancona' } },
            { order:9, name:'Museo Archeologico Nazionale delle Marche', emoji:'🏺', photo:'museo-archeologico.jpg', it:'Palazzo cinquecentesco dei conti Ferretti con sale affrescate dal Tibaldi, sede del Museo Archeologico Nazionale delle Marche con ricchissima collezione di reperti dal paleolitico al periodo ellenistico romano. Proseguendo si passa davanti al Palazzo del Senato del XIII sec. per continuare per una scalinata che porta fino al Duomo.', en:'16th-century palace of the Ferretti counts with frescoed halls by Tibaldi, home of the National Archaeological Museum of the Marche with a rich collection of finds from the Palaeolithic to the Hellenistic-Roman period. Continuing, you pass the 13th-century Palazzo del Senato and then take a staircase leading up to the Cathedral.', de:'Palast der Grafen Ferretti aus dem 16. Jahrhundert mit von Tibaldi freskierten Sälen, Sitz des Nationalen Archäologischen Museums der Marken mit einer reichen Sammlung von Funden von der Altsteinzeit bis zur hellenistisch-römischen Zeit. Weiter geht es vorbei am Palazzo del Senato aus dem 13. Jahrhundert und dann eine Treppe hinauf zur Kathedrale.', pl:'XVI-wieczny pałac hrabiów Ferretti z salami ozdobionymi freskami przez Tibaldiego, siedziba Narodowego Muzeum Archeologicznego Marchii z bogatą kolekcją znalezisk od paleolitu po okres hellenistyczno-rzymski. Idąc dalej, mijamy XIII-wieczny Palazzo del Senato, a następnie schodami prowadzącymi do Katedry.', dist:'🚶 750 m – 10 min', mapQuery:'Museo Archeologico Nazionale Ancona', lat:43.6234656, lng:13.5109808 },
            { order:10, name:'Cattedrale di San Ciriaco', emoji:'⛪', photo:'duomo-san-ciriaco.jpg', it:'La Cattedrale di San Ciriaco, che rappresenta l\'emblema di Ancona, sorge sull\'antico tempio dedicato a Venere Euplea, protettrice della navigazione, di cui restano parte delle fondamenta. Su di esso, nel VI secolo d.C., venne costruita la basilica paleocristiana dedicata a San Lorenzo, che divenne Cattedrale nel 1000 quando vi furono traslati i corpi di San Ciriaco e San Marcellino. Spettacolare panorama sulla città. A sinistra della facciata c\'è il Museo Diocesano. Scendendo invece sulla destra si arriva ai resti dell\'Anfiteatro romano.', en:'The Cathedral of San Ciriaco, the emblem of Ancona, stands on the ancient temple dedicated to Venus Euplea, protector of navigation, of which part of the foundations remain. On it, in the 6th century AD, the early Christian basilica dedicated to San Lorenzo was built, which became the Cathedral in the year 1000 when the bodies of Saint Cyriacus and Saint Marcellinus were transferred there. Spectacular view over the city. To the left of the façade is the Diocesan Museum. Descending to the right, instead, you reach the remains of the Roman Amphitheatre.', de:'Die Kathedrale San Ciriaco, das Wahrzeichen Anconas, steht auf dem antiken Tempel der Venus Euplea, der Beschützerin der Schifffahrt, von dem Teile der Fundamente erhalten sind. Darauf wurde im 6. Jahrhundert n. Chr. die frühchristliche Basilika San Lorenzo erbaut, die im Jahr 1000 zur Kathedrale wurde, als die Gebeine der Heiligen Cyriacus und Marcellinus dorthin überführt wurden. Spektakulärer Blick über die Stadt. Links von der Fassade befindet sich das Diözesanmuseum. Rechts hinunter gelangt man zu den Überresten des römischen Amphitheaters.', pl:'Katedra San Ciriaco, która jest symbolem Ankony, wznosi się na starożytnej świątyni poświęconej Wenus Euplea, opiekunce żeglugi, z której zachowała się część fundamentów. Na niej, w VI wieku n.e., zbudowano wczesnochrześcijańską bazylikę pod wezwaniem San Lorenzo, która stała się katedrą w roku 1000, kiedy przeniesiono tam ciała świętego Cyriaka i świętego Marcellina. Spektakularny widok na miasto. Na lewo od fasady znajduje się Muzeum Diecezjalne. Schodząc natomiast w prawo, docieramy do pozostałości rzymskiego Amfiteatru.', dist:'🚶 1000 m – 13 min', mapQuery:'Cattedrale di San Ciriaco Ancona', lat:43.6251216, lng:13.510037 },
            { order:11, name:'Anfiteatro Romano', emoji:'🏟️', photo:'anfiteatro-romano.jpg', it:'Anfiteatro realizzato in età augustea (I sec. a.C.) che poteva accogliere fino a 10.000 spettatori. Dopo l\'abbandono in età antica (IV sec. d.C.) venne utilizzato come cava di materiali e, a partire dal XIII secolo, come base per nuove costruzioni che ne hanno nascosto la struttura. Fu riportato alla luce solo a partire dagli anni 70. Tornando in discesa verso piazza del Senato si possono ammirare degli splendidi mosaici. Scendendo per via Pizzecolli si torna in piazza Stracca dove, di fronte alla facciata del Palazzo degli Anziani si erge la maestosa chiesa del Gesù progettata dal Vanvitelli.', en:'Amphitheatre built in the Augustan age (1st century BC) that could hold up to 10,000 spectators. After its abandonment in ancient times (4th century AD), it was used as a quarry for building materials and, from the 13th century, as a foundation for new constructions that concealed its structure. It was brought back to light only from the 1970s onwards. Heading back down towards Piazza del Senato you can admire some splendid mosaics. Descending Via Pizzecolli you return to Piazza Stracca where, opposite the façade of Palazzo degli Anziani, stands the majestic Chiesa del Gesù designed by Vanvitelli.', de:'Amphitheater aus der augusteischen Zeit (1. Jh. v. Chr.), das bis zu 10.000 Zuschauer fasste. Nach seiner Aufgabe in der Antike (4. Jh. n. Chr.) diente es als Steinbruch und ab dem 13. Jahrhundert als Fundament für neue Gebäude, die seine Struktur verbargen. Erst ab den 1970er Jahren wieder ans Licht gebracht. Zurück hinunter zum Piazza del Senato bewundern Sie prächtige Mosaike. Über die Via Pizzecolli gelangen Sie zurück zur Piazza Stracca, wo gegenüber der Fassade des Palazzo degli Anziani die majestätische Chiesa del Gesù nach einem Entwurf von Vanvitelli steht.', pl:'Amfiteatr zbudowany w epoce augustiańskiej (I w. p.n.e.), który mógł pomieścić do 10 000 widzów. Po opuszczeniu w starożytności (IV w. n.e.) był wykorzystywany jako kamieniołom, a od XIII wieku jako podstawa dla nowych budowli, które ukryły jego strukturę. Został ponownie odsłonięty dopiero od lat 70. XX wieku. Schodząc z powrotem w kierunku Piazza del Senato, można podziwiać wspaniałe mozaiki. Idąc w dół Via Pizzecolli, wracamy na Piazza Stracca, gdzie naprzeciwko fasady Palazzo degli Anziani wznosi się majestatyczny kościół del Gesù zaprojektowany przez Vanvitellego.', dist:'🚶 900 m – 12 min', mapQuery:'Anfiteatro Romano Ancona', lat:43.6247408, lng:13.5117513 },
            { order:12, name:'Chiesa del Gesù', emoji:'⛪', photo:'chiesa-gesu.jpg', it:'Monumento commissionato dal conte Nappi nel 1605. Nel 1733 i Gesuiti affidarono a Luigi Vanvitelli il progetto dell\'ampliamento della chiesa realizzato con la facciata concava che richiama la forma del porto. Continuando a scendere per via Pizzecolli, una delle più antiche vie della città, si raggiunge piazza San Francesco, ove si erge l\'omonima chiesa.', en:'Monument commissioned by Count Nappi in 1605. In 1733 the Jesuits entrusted Luigi Vanvitelli with the project for the enlargement of the church, carried out with a concave façade that echoes the shape of the harbour. Continuing down Via Pizzecolli, one of the oldest streets in the city, you reach Piazza San Francesco, where the church of the same name stands.', de:'Monument, das 1605 von Graf Nappi in Auftrag gegeben wurde. 1733 beauftragten die Jesuiten Luigi Vanvitelli mit dem Erweiterungsprojekt der Kirche, das mit einer konkaven Fassade ausgeführt wurde, die die Form des Hafens widerspiegelt. Weiter die Via Pizzecolli hinunter, eine der ältesten Straßen der Stadt, erreichen Sie die Piazza San Francesco, wo die gleichnamige Kirche steht.', pl:'Monument zamówiony przez hrabiego Nappi w 1605 roku. W 1733 roku Jezuici powierzyli Luigiemu Vanvitellemu projekt rozbudowy kościoła, zrealizowany z wklęsłą fasadą nawiązującą do kształtu portu. Kontynuując w dół Via Pizzecolli, jedną z najstarszych ulic miasta, docieramy do Piazza San Francesco, gdzie wznosi się kościół o tej samej nazwie.', dist:'🚶 600 m – 8 min', mapQuery:'Chiesa del Gesù Ancona', lat:43.6226099, lng:13.5111676 },
            { order:13, name:'San Francesco alle Scale', emoji:'⛪', photo:'san-francesco-scale.jpg', it:'Dall\'alto di una gradinata, la Chiesa di San Francesco delle Scale prospetta su Piazza San Francesco, con un notevole effetto scenografico. Facciata con magnifico portale gotico-veneziano a forma di tabernacolo, realizzato in pietra di Brioni da Giorgio da Sebenico, alla metà del Quattrocento (1455). All\'interno opere notevoli, dal Lotto a Tibaldi. Scendendo per via Pizzecolli si arriva alla Pinacoteca civica.', en:'From the top of a flight of steps, the Church of San Francesco delle Scale overlooks Piazza San Francesco, with a remarkable scenic effect. Façade with a magnificent Venetian-Gothic tabernacle-shaped portal, made of Brioni stone by Giorgio da Sebenico in the mid-15th century (1455). Inside, notable works from Lotto to Tibaldi. Descending Via Pizzecolli you reach the Civic Art Gallery (Pinacoteca civica).', de:'Von der Spitze einer Treppe überblickt die Kirche San Francesco delle Scale die Piazza San Francesco mit bemerkenswerter szenischer Wirkung. Fassade mit einem prächtigen venezianisch-gotischen Portal in Form eines Tabernakels, gefertigt aus Brioni-Stein von Giorgio da Sebenico Mitte des 15. Jahrhunderts (1455). Im Inneren bedeutende Werke von Lotto bis Tibaldi. Über die Via Pizzecolli gelangt man zur Städtischen Pinakothek (Pinacoteca civica).', pl:'Ze szczytu schodów kościół San Francesco delle Scale góruje nad Piazza San Francesco, tworząc niezwykły efekt scenograficzny. Fasada ze wspaniałym wenecko-gotyckim portalem w kształcie tabernakulum, wykonanym z kamienia z Brioni przez Giorgio da Sebenico w połowie XV wieku (1455). We wnętrzu znakomite dzieła, od Lotta po Tibaldiego. Schodząc Via Pizzecolli, docieramy do Pinakoteki Miejskiej (Pinacoteca civica).', dist:'🚶 450 m – 6 min', mapQuery:'Chiesa di San Francesco alle Scale Ancona', lat:43.6214786, lng:13.5118841 },
            { order:14, name:'Pinacoteca Civica F. Podesti', emoji:'🖼️', photo:'', it:'Pinacoteca civica con opere di importanti autori tra cui Tiziano, Lotto, Crivelli, Guercino. Continuando si passa per il cinquecentesco Arco del Rastrello e si arriva in Piazza del Plebiscito.', en:'Civic art gallery with works by important artists including Titian, Lotto, Crivelli, Guercino. Continuing, you pass through the 16th-century Arco del Rastrello and reach Piazza del Plebiscito.', de:'Städtische Gemäldegalerie mit Werken bedeutender Künstler wie Tizian, Lotto, Crivelli, Guercino. Weiter geht es durch den Arco del Rastrello aus dem 16. Jahrhundert zur Piazza del Plebiscito.', pl:'Miejska pinakoteka z dziełami ważnych artystów, m.in. Tycjana, Lotta, Crivellego, Guercina. Idąc dalej, przechodzimy przez XVI-wieczny Arco del Rastrello i docieramy na Piazza del Plebiscito.', dist:'🚶 300 m – 4 min', mapQuery:'Pinacoteca Civica Podesti Ancona', lat:43.6208333, lng:13.5122222 },
            { order:15, name:'Piazza del Plebiscito', emoji:'⛲', photo:'piazza-plebiscito.jpg', it:'Nata come Piazza Nuova, le sue dimensioni la fecero subito ribattezzare Piazza Grande sino al 1860, anno in cui prende il nome dell\'attuale Piazza del Plebiscito, notoriamente chiamata Piazza del Papa per la presenza della statua di Papa Clemente XII. Su di essa si affacciano il Palazzo del Governo, sede della Prefettura, la chiesa di San Domenico e importanti palazzi storici. Oggi resta il centro nevralgico della parte antica della città e importante luogo di vita notturna e sociale di Ancona. Passando per la caratteristica via degli Orefici si torna in Corso Mazzini ed alla Fontana delle 13 Cannelle.', en:'Originally called Piazza Nuova, its size soon earned it the name Piazza Grande until 1860, when it took its current name Piazza del Plebiscito, popularly known as Piazza del Papa due to the statue of Pope Clement XII. It is overlooked by the Palazzo del Governo, seat of the Prefecture, the church of San Domenico and important historic buildings. Today it remains the nerve centre of the old part of the city and an important venue for Ancona\'s nightlife and social life. Passing through the characteristic Via degli Orefici you return to Corso Mazzini and the Fontana delle 13 Cannelle.', de:'Ursprünglich Piazza Nuova genannt, bekam sie aufgrund ihrer Größe schnell den Namen Piazza Grande, bis sie 1860 ihren heutigen Namen Piazza del Plebiscito erhielt, allgemein bekannt als Piazza del Papa wegen der Statue von Papst Clemens XII. Auf den Platz blicken der Palazzo del Governo, Sitz der Präfektur, die Kirche San Domenico und bedeutende historische Paläste. Heute ist er das pulsierende Zentrum der Altstadt und ein wichtiger Ort des Nacht- und Soziallebens von Ancona. Durch die charakteristische Via degli Orefici kehrt man zum Corso Mazzini und zur Fontana delle 13 Cannelle zurück.', pl:'Pierwotnie nazwany Piazza Nuova, jego rozmiary szybko sprawiły, że przemianowano go na Piazza Grande aż do 1860 roku, kiedy to otrzymał obecną nazwę Piazza del Plebiscito, powszechnie zwanego Piazza del Papa ze względu na posąg papieża Klemensa XII. Znajduje się przy nim Palazzo del Governo, siedziba Prefektury, kościół San Domenico oraz ważne historyczne pałace. Dziś pozostaje nerwowym centrum starej części miasta i ważnym miejscem życia nocnego i towarzyskiego Ankony. Przechodząc przez charakterystyczną Via degli Orefici, wracamy na Corso Mazzini i do Fontanny 13 Cannelle.', dist:'🚶 200 m – 3 min', mapQuery:'Piazza del Plebiscito Ancona', lat:43.6195337, lng:13.511651 },
            { order:16, name:'Parco del Cardeto', emoji:'🌳', photo:'', isSubItinerary:true, subId:'cardeto', it:'Il Parco del Cardeto è il più vasto parco urbano di Ancona, aperto nel 2005. A picco sul mare, immerso nella natura, occupa le sommità di Monte Cappuccini e Monte Cardeto e si estende in un\'area di circa 35 ettari, tutti a ridosso del centro. Comprende luoghi di valore storico, un ambiente naturale di notevole interesse e numerosi punti panoramici sulla costa alta e sulla città. Fino agli anni 70 l\'area era adibita ad uso militare.', en:'The Parco del Cardeto is Ancona\'s largest urban park, opened in 2005. Perched on the cliffs overlooking the sea and surrounded by nature, it occupies the summits of Monte Cappuccini and Monte Cardeto and covers an area of about 35 hectares, all close to the city centre. It includes sites of historical value, a natural environment of great interest, and numerous panoramic points over the high coast and the city. Until the 1970s, the area was used for military purposes.', de:'Der Parco del Cardeto ist der größte Stadtpark Anconas, eröffnet 2005. Auf den Klippen über dem Meer gelegen und von Natur umgeben, nimmt er die Gipfel des Monte Cappuccini und Monte Cardeto ein und erstreckt sich über etwa 35 Hektar, alles in unmittelbarer Nähe zum Zentrum. Er umfasst Orte von historischem Wert, eine natürliche Umgebung von großem Interesse und zahlreiche Panoramablicke auf die Steilküste und die Stadt. Bis in die 1970er Jahre wurde das Gebiet militärisch genutzt.', pl:'Parco del Cardeto to największy park miejski w Ankonie, otwarty w 2005 roku. Położony na klifach z widokiem na morze, otoczony przyrodą, zajmuje szczyty Monte Cappuccini i Monte Cardeto i rozciąga się na powierzchni około 35 hektarów, tuż przy centrum miasta. Obejmuje miejsca o wartości historycznej, środowisko naturalne o dużym znaczeniu i liczne punkty widokowe na wysokie wybrzeże i miasto. Do lat 70. XX wieku teren ten był wykorzystywany do celów wojskowych.', dist:'🌳 Parco cittadino', mapQuery:'Parco del Cardeto Ancona', lat:43.6222659, lng:13.5207122 },
            { order:17, name:'Porta Pia', emoji:'🚪', photo:'porta-pia.jpg', it:'Dal Teatro delle Muse, se invece di andare a destra verso la Loggia dei Mercanti si prende a sinistra e si percorre il lungomare Vanvitelli, in breve si arriva a Porta Pia. Antica porta monumentale di accesso alla città costruita tra il 1787 e il 1789 su richiesta di Papa Pio VI per realizzare una nuova strada "a mare" che evitasse lo scavalcamento disagevole del sovrastante colle Astagno.', en:'From the Teatro delle Muse, if instead of going right towards the Loggia dei Mercanti you turn left and follow the Vanvitelli seafront, you soon reach Porta Pia. Ancient monumental gateway to the city, built between 1787 and 1789 at the request of Pope Pius VI to create a new "sea road" that would avoid the difficult climb over the Astagno hill.', de:'Vom Teatro delle Muse, wenn Sie statt rechts zur Loggia dei Mercanti nach links gehen und der Uferpromenade Vanvitelli folgen, erreichen Sie bald die Porta Pia. Antikes monumentales Stadttor, erbaut zwischen 1787 und 1789 auf Wunsch von Papst Pius VI., um eine neue "Meeresstraße" zu schaffen, die den beschwerlichen Aufstieg über den Hügel Astagno vermeiden sollte.', pl:'Od Teatro delle Muse, jeśli zamiast iść w prawo w kierunku Loggia dei Mercanti, skręcimy w lewo i pójdziemy wzdłuż nadmorskiej promenady Vanvitellego, wkrótce dotrzemy do Porta Pia. Starożytna monumentalna brama wjazdowa do miasta, zbudowana w latach 1787–1789 na prośbę papieża Piusa VI, aby stworzyć nową „drogę morską", która pozwalała uniknąć trudnej wspinaczki na wzgórze Astagno.', dist:'🚶 950 m – 13 min', mapQuery:'Porta Pia Ancona', lat:43.6152484, lng:13.5048966 },
            { order:18, name:'Mole Vanvitelliana', emoji:'🏛️', photo:'mole-vanvitelliana.jpg', it:'Affacciandosi dalla balaustra del lungomare si può ammirare il suo ingresso principale. Vero e proprio capolavoro di edilizia ed ingegneria sull\'acqua, la Mole vanvitelliana è un ex lazzaretto costruito da Luigi Vanvitelli tra il 1733 e 1743. Sorge su di un\'isola artificiale pentagonale situata all\'interno del porto; oggi è collegato alla terraferma da tre ponti, ed occupa una superficie di 20.000 m². Attualmente al suo interno vi sono ampi spazi espositivi e il Museo Tattile Statale Omero.', en:'Leaning over the seafront balustrade you can admire its main entrance. A true masterpiece of architecture and engineering on water, the Mole Vanvitelliana is a former lazaretto built by Luigi Vanvitelli between 1733 and 1743. It stands on a pentagonal artificial island inside the port; today it is connected to the mainland by three bridges and covers an area of 20,000 m². Inside, it now houses large exhibition spaces and the Museo Tattile Statale Omero.', de:'Von der Balustrade der Uferpromenade aus können Sie den Haupteingang bewundern. Ein wahres Meisterwerk der Architektur und Ingenieurskunst auf dem Wasser, die Mole Vanvitelliana ist ein ehemaliges Lazarett, das von Luigi Vanvitelli zwischen 1733 und 1743 erbaut wurde. Es steht auf einer fünfeckigen künstlichen Insel im Hafen; heute ist es durch drei Brücken mit dem Festland verbunden und umfasst eine Fläche von 20.000 m². Im Inneren befinden sich heute große Ausstellungsräume und das Staatliche Tastmuseum Omero.', pl:'Wychylając się z balustrady nadmorskiej promenady, można podziwiać jej główne wejście. Prawdziwe arcydzieło architektury i inżynierii na wodzie, Mole Vanvitelliana to dawny lazaret zbudowany przez Luigiego Vanvitelliego w latach 1733–1743. Wznosi się na sztucznej pięciokątnej wyspie wewnątrz portu; dziś jest połączona z lądem trzema mostami i zajmuje powierzchnię 20 000 m². Obecnie mieszczą się w niej duże przestrzenie wystawowe i Museo Tattile Statale Omero.', dist:'🚶 1100 m – 14 min', mapQuery:'Mole Vanvitelliana Ancona', lat:43.6143735, lng:13.504058, extraMap:{ label:'🖐️ Museo Tattile Omero', query:'Museo Tattile Statale Omero Ancona' } },
            { order:19, name:'Fortezza e Parco della Cittadella', emoji:'🏰', photo:'', isSubItinerary:true, subId:'cittadella', it:'Nel quartiere Capodimonte, sulla sommità del colle Astagno e per opera dell\'architetto Antonio da Sangallo il Giovane, sorge "La Cittadella", un\'edificazione militare rinascimentale realizzata nel 1532 che si affaccia sulla città e sul porto. All\'interno dell\'antico campo trincerato si trova il Parco della Cittadella.', en:'In the Capodimonte district, on the summit of the Astagno hill, stands "La Cittadella", a Renaissance military fortification built in 1532 by the architect Antonio da Sangallo the Younger, overlooking the city and the port. Inside the ancient entrenched field lies the Parco della Cittadella.', de:'Im Viertel Capodimonte, auf dem Gipfel des Hügels Astagno, erhebt sich "La Cittadella", eine militärische Festungsanlage der Renaissance, die 1532 vom Architekten Antonio da Sangallo dem Jüngeren erbaut wurde und auf die Stadt und den Hafen blickt. Innerhalb des alten befestigten Feldes liegt der Parco della Cittadella.', pl:'W dzielnicy Capodimonte, na szczycie wzgórza Astagno, wznosi się "La Cittadella" – renesansowa fortyfikacja wojskowa zbudowana w 1532 roku przez architekta Antonia da Sangallo Młodszego, z widokiem na miasto i port. Wewnątrz starożytnego obozu warownego znajduje się Parco della Cittadella.', dist:'🚶 800 m – 11 min', mapQuery:'Fortezza della Cittadella Ancona', lat:43.6138415, lng:13.5080277 },
            { order:20, name:'Passetto', emoji:'🌊', photo:'passetto.jpg', it:'Arrivando da Corso Garibaldi, dopo aver attraversato piazza Cavour e percorso tutto il viale della Vittoria, si arriva al Passetto. Già da lontano si può vedere "il monumento", come lo chiamano gli anconetani, per poi ammirare il panorama dall\'ascensore (sulla sinistra), o scendere per la scalinata monumentale per scoprire le caratteristiche grotte nella falesia e fare il bagno.', en:'Coming from Corso Garibaldi, after crossing Piazza Cavour and walking all along Viale della Vittoria, you reach the Passetto. Already from afar you can see "the monument", as the locals call it, then admire the view from the lift (on the left), or go down the monumental staircase to discover the characteristic grottoes in the cliff and take a swim.', de:'Vom Corso Garibaldi kommend, nach Überquerung der Piazza Cavour und entlang der gesamten Viale della Vittoria, erreichen Sie das Passetto. Schon von weitem sieht man "das Denkmal", wie die Einheimischen es nennen, und kann dann die Aussicht vom Aufzug (links) genießen oder die monumentale Treppe hinabsteigen, um die charakteristischen Grotten in der Klippe zu entdecken und ein Bad zu nehmen.', pl:'Przychodząc od Corso Garibaldi, po przejściu przez Piazza Cavour i przejściu całej alei Viale della Vittoria, docieramy do Passetto. Już z daleka widać "pomnik", jak nazywają go miejscowi, a następnie można podziwiać panoramę z windy (po lewej stronie) lub zejść monumentalnymi schodami, aby odkryć charakterystyczne groty w klifie i wykąpać się.', dist:'🚶 2150 m – 29 min', mapQuery:'Spiaggia del Passetto Ancona', lat:43.6152132, lng:13.5341042 }

        if (!navigator.geolocation) { const textEl = document.querySelector('.gps-box .gps-text'); const btnsEl = document.querySelector('.gps-box .gps-buttons'); if (textEl) textEl.innerHTML = `<strong>⚠️ ${tr('GPS non supportato', 'GPS not supported', 'GPS nicht unterstützt', 'GPS nieobsługiwany')}</strong><br>${tr('Il tuo dispositivo non supporta la geolocalizzazione.', 'Your device does not support geolocation.', 'Ihr Gerät unterstützt keine Geolokalisierung.', 'Twoje urządzenie nie obsługuje geolokalizacji.')}`; if (btnsEl) btnsEl.innerHTML = ''; return; }
        gpsWatchId = navigator.geolocation.watchPosition((position) => { const lat = position.coords.latitude; const lng = position.coords.longitude; const accuracy = position.coords.accuracy; if (!leafletMap) return; if (gpsMarker) gpsMarker.setLatLng([lat, lng]); else { const gpsIcon = L.divIcon({ html: '<div class="gps-blue-dot-wrap"><div class="gps-blue-dot"></div><div class="gps-blue-dot-pulse"></div></div>', className: '', iconSize: [20, 20], iconAnchor: [10, 10] }); gpsMarker = L.marker([lat, lng], { icon: gpsIcon, zIndexOffset: 2000 }).addTo(leafletMap); } if (gpsCircle) { gpsCircle.setLatLng([lat, lng]); gpsCircle.setRadius(accuracy); } else gpsCircle = L.circle([lat, lng], { radius: accuracy, color: '#007aff', fillColor: '#007aff', fillOpacity: 0.15, weight: 1 }).addTo(leafletMap); updateGpsUI(); }, (error) => { if (error.code === error.PERMISSION_DENIED) { const textEl = document.querySelector('.gps-box .gps-text'); const btnsEl = document.querySelector('.gps-box .gps-buttons'); if (textEl) textEl.innerHTML = `<strong>🔒 ${tr('Accesso GPS negato', 'GPS access denied', 'GPS-Zugriff verweigert', 'Odmowa dostępu GPS')}</strong><br>${tr('Abilita i permessi di localizzazione nelle impostazioni del browser.', 'Enable location permissions in your browser settings.', 'Aktivieren Sie die Standortberechtigungen in den Browser-Einstellungen.', 'Włącz uprawnienia lokalizacji w ustawieniach przeglądarki.')}`; if (btnsEl) btnsEl.innerHTML = ''; if (gpsWatchId !== null) toggleGpsTracking(); } }, { enableHighAccuracy: true, timeout: 10000, maximumAge: 2000 }); updateGpsUI();
    }

    function renderAll() {

    function renderSection(id) {

        if (id === 'apartment') return renderApartment();
        const map = { mustsee: () => { if (currentSubItinerary) return appData.subItineraries[currentSubItinerary] || []; return appData.mustsee.slice().sort(sortMustSee); }, restaurants: () => appData.restaurants, barpub: () => appData.barpub, supermarkets: () => appData.supermarkets, beaches: () => appData.beaches, parking: () => appData.parking, around: () => appData.around, marche: () => appData.marche };
        if (map[id]) return renderPlaceSection(map[id](), id);
        return '';
    }

    function starBtnHtml() {
        if (currentSectionPlaces && currentSectionPlaces.length > 0) { let minDist = Infinity; for (let i = 0; i < currentSectionPlaces.length; i++) { const p = currentSectionPlaces[i]; if (p._dist !== undefined && p._dist < minDist) minDist = p._dist; } if (minDist > 30) return ''; }
        return `<button class="star-list-btn" id="star-home-btn" aria-label="Centra la mappa su Ancona Centro">★ Ancona Centro</button>`;
    }

    function renderPlaceSection(items, sectionId) {
        currentSectionPlaces = items;
        for (let i = 0; i < items.length; i++) { const p = items[i]; if (p.lat && p.lng) p._dist = calcDistance(HOME_COORDS.lat, HOME_COORDS.lng, p.lat, p.lng); else p._dist = Infinity; }
        const parkingInfoBox = (sectionId === 'parking') ? `<div class="card" style="margin-top: 8px;"><div class="card-header"><span class="card-header-icon">🅿️</span><span class="card-title">Strisce blu (zona centro)</span></div><div class="card-body">Parcheggio a pagamento su strada, posto difficile.</div></div>` : '';
        if (currentSubItinerary) {
            let parent = null; for (let k = 0; k < appData.mustsee.length; k++) { if (appData.mustsee[k].subId === currentSubItinerary) { parent = appData.mustsee[k]; break; } }
            const descHtml = parent ? `<div class="card"><div class="place-body"><div class="place-emoji-sm" aria-hidden="true">${parent.emoji}</div><div><div class="place-name">${parent.name}</div><div class="place-desc" style="margin-top:5px;">${tr(parent.it, parent.en, parent.de, parent.pl)}</div></div></div></div>` : '';
            if (currentPlaceDetail >= 0 && currentPlaceDetail < items.length) return renderAnyPlaceDetail(items[currentPlaceDetail], currentPlaceDetail, items.length, true) + parkingInfoBox;
            const subBtns = items.map((p, i) => { const dn = getDisplayNumber(p, i); const sel = (i === currentPlaceDetail) ? ' selected' : ''; return `<button class="place-btn-mini${sel}" data-index="${i}" aria-label="${p.name}">${dn}. ${p.name}</button>`; }).join('');
            return `<button class="back-btn" id="sub-back-btn">← ${tr('Torna al tour principale', 'Back to main tour', 'Zurück zur Haupttour', 'Powrót do głównej trasy')}</button>${descHtml}<div class="map-list-wrap"><div id="sectionMap" class="section-map-el" role="application" aria-label="Mappa dei luoghi"></div><div class="place-btn-col">${starBtnHtml()}${subBtns}</div></div>${parkingInfoBox}`;
        }

                `Die Unterkunft befindet sich am zentralen Platz von Ancona, in einer Fußgängerzone. Wenn Sie das Zentrum besichtigen möchten, brauchen Sie kein Auto. Auf den umliegenden Straßen können Sie auf den blauen Parkbuchten parken (werktags 8–20 Uhr, 1,20 €/Std.), aber es ist schwer, einen Platz zu finden. Es gibt mehrere Parkhäuser; ich empfehle das günstigere <a href="https://anconaservizi.it/parcheggi-coperti/parcheggio-scambiatore-degli-archi/" target="_blank" rel="noopener">Parkhaus „degli Archi"</a> in 1,5 km Entfernung, von wo aus die Unterkunft bequem zu Fuß auf einem völlig flachen Weg erreichbar ist.<br><br>Wenn Sie den Bus bevorzugen, nehmen Sie die Linie 1/4 Richtung Zentrum und steigen Sie am Piazza Roma aus (5 Minuten). Überqueren Sie den Platz, Hausnummer 3 befindet sich links vom Pferdebrunnen.<br>Läuten Sie an der Haustür bei „Frisoli" und nehmen Sie dann den Aufzug in den vierten Stock.`,

                `Dall'aeroporto si può prendere un taxi, scelta più comoda ma molto più costosa, prendere il bus raffaello, comodo ma presente solo per alcuni voli, oppure il treno che è la soluzione che consiglio per raggiungere la stazione di Ancona e poi proseguire con l'itinerario indicato per chi arriva in treno. Ne passano di frequente e la stazione è proprio di fronte al terminal.<br><br>🔗 <a href="https://www.trenitalia.com/it.html" target="_blank" rel="noopener">Orari in tempo reale su Trenitalia</a>`,
                `From the airport you can take a taxi (most convenient but far more expensive), the Raffaello bus (convenient but only available for certain flights), or the train – the option I recommend to reach Ancona station, then follow the directions for those arriving by train. Trains run frequently, and the station is right opposite the terminal.<br><br>🔗 <a href="https://www.trenitalia.com/it.html" target="_blank" rel="noopener">Real‑time timetables on Trenitalia</a>`,
                `Vom Flughafen aus können Sie ein Taxi nehmen (am bequemsten, aber deutlich teurer), den Raffaello‑Bus (praktisch, aber nur für bestimmte Flüge) oder den Zug – die von mir empfohlene Lösung, um den Bahnhof von Ancona zu erreichen, und dann der Beschreibung für Zugreisende folgen. Züge verkehren regelmäßig, und der Bahnhof befindet sich direkt gegenüber dem Terminal.<br><br>🔗 <a href="https://www.trenitalia.com/it.html" target="_blank" rel="noopener">Echtzeit‑Fahrpläne auf Trenitalia</a>`,
                `Z lotniska można wziąć taksówkę (najwygodniejsza, ale znacznie droższa opcja), autobus Raffaello (wygodny, ale dostępny tylko dla niektórych lotów) lub pociąg – rozwiązanie, które polecam, aby dotrzeć na stację Ancona, a następnie postępować według wskazówek dla przyjeżdżających pociągiem. Pociągi kursują często, a stacja znajduje się dokładnie naprzeciwko terminalu.<br><br>🔗 <a href="https://www.trenitalia.com/it.html" target="_blank" rel="noopener">Rozkłady jazdy na żywo w Trenitalia</a>`
            )
        };
        window._reachTexts = { auto: reachData.autoBody, treno: reachData.trenoBody, aereo: reachData.aereoBody };
        window._activeReachTab = window._activeReachTab || 'auto';
        window._toggleReach = function(type) {
            window._activeReachTab = type;
            const contentEl = document.getElementById('reach-content');
            if (contentEl) contentEl.innerHTML = window._reachTexts[type];
            document.querySelectorAll('.reach-sub-btn').forEach(b => {
                const isActive = b.dataset.reach === type;
                b.style.background = isActive ? 'var(--navy)' : 'var(--bg)';
                b.style.color = isActive ? 'var(--white)' : 'var(--text)';
                b.style.fontWeight = isActive ? '600' : '500';
            });
        };
        const reachCardHtml = `<div class="card" style="border-left: 3px solid var(--gold); margin-bottom: 12px;"><div class="card-header"><span class="card-header-icon">📍</span><span class="card-title">${reachData.title}</span></div><div class="card-body"><div style="display: flex; gap: 6px; margin-bottom: 14px;"><button class="reach-sub-btn" data-reach="auto" style="flex: 1; border: 1px solid var(--border); padding: 8px 4px; border-radius: 8px; font-size: 0.72rem; transition: all 0.2s; outline: none;">${reachData.autoLabel}</button><button class="reach-sub-btn" data-reach="treno" style="flex: 1; background: var(--bg); color: var(--text); border: 1px solid var(--border); padding: 8px 4px; border-radius: 8px; font-size: 0.72rem; font-weight: 500; transition: all 0.2s; outline: none;">${reachData.trenoLabel}</button><button class="reach-sub-btn" data-reach="aereo" style="flex: 1; background: var(--bg); color: var(--text); border: 1px solid var(--border); padding: 8px 4px; border-radius: 8px; font-size: 0.72rem; font-weight: 500; transition: all 0.2s; outline: none;">${reachData.aereoLabel}</button></div><div id="reach-content" style="font-size: 0.82rem; line-height: 1.6; color: var(--text);">${window._reachTexts[window._activeReachTab]}</div></div></div>`;
        const cards = [
            { icon: '📶', title: tr('Wi‑Fi', 'Wi‑Fi', 'WLAN', 'Wi‑Fi'), body: tr(a.wifi.it, a.wifi.en, a.wifi.de, a.wifi.pl) },
            { icon: '🚪', title: tr('Citofono', 'Intercom', 'Gegensprechanlage', 'Domofon'), body: tr(a.access.it, a.access.en, a.access.de, a.access.pl) },
            { icon: '🔑', title: tr('Chiavi', 'Keys', 'Schlüssel', 'Klucze'), body: tr(a.keys.it, a.keys.en, a.keys.de, a.keys.pl) },
            { icon: '🏨', title: tr('Check‑in flessibile', 'Flexible check‑in', 'Flexibler Check‑in', 'Elastyczne zameldowanie'), body: tr(a.checkin.it, a.checkin.en, a.checkin.de, a.checkin.pl) },
            { icon: '🧳', title: tr('Check‑out flessibile', 'Flexible check‑out', 'Flexibler Check‑out', 'Elastyczne wymeldowanie'), body: tr(a.checkout.it, a.checkout.en, a.checkout.de, a.checkout.pl) },
            { icon: '♻️', title: tr('Raccolta differenziata', 'Recycling', 'Mülltrennung', 'Segregacja'), body: tr(a.recycling.it, a.recycling.en, a.recycling.de, a.recycling.pl) }
        ];
        let html = reachCardHtml;
        for (let i = 0; i < cards.length; i++) html += `<div class="card"><div class="card-header"><span class="card-header-icon" aria-hidden="true">${cards[i].icon}</span><span class="card-title">${cards[i].title}</span></div><div class="card-body">${cards[i].body}</div></div>`;
        const rulesTitle = tr('📋 Regole della casa', '📋 House rules', '📋 Hausregeln', '📋 Zasady domu');
        let rulesHtml = `<div class="card"><div class="card-header"><span class="card-header-icon" aria-hidden="true">📋</span><span class="card-title">${rulesTitle}</span></div><div class="card-body">`;
        for (let i = 0; i < appData.rules.length; i++) { const r = appData.rules[i]; rulesHtml += `<div class="rule-row"><span class="rule-icon" aria-hidden="true">${r.icon}</span><span class="rule-text">${tr(r.it, r.en, r.de, r.pl)}</span></div>`; }
        rulesHtml += `</div></div>`; html += rulesHtml;
        return html;
    }

    function renderContact() {
        const fp = HOST_PHONE.replace(/(\d{3})(\d{3})(\d{4})/, '$1 $2 $3');
        return `<div class="contact-card"><div class="contact-label">📞 ${tr('Host disponibile su WhatsApp', 'Host available on WhatsApp', 'Gastgeber auf WhatsApp erreichbar', 'Gospodarz dostępny na WhatsAppie')}</div><div class="contact-number">${fp}</div><div class="contact-btns"><a href="https://wa.me/39${HOST_PHONE}" target="_blank" rel="noopener" class="btn-wa" aria-label="Contatta su WhatsApp">💬 WhatsApp</a><a href="tel:+39${HOST_PHONE}" class="btn-call" aria-label="Chiama il numero di telefono">📞 ${tr('Chiama', 'Call', 'Anrufen', 'Zadzwoń')}</a></div><div class="contact-email">✉️ <a href="mailto:${HOST_EMAIL}">${HOST_EMAIL}</a></div><div style="margin-top:14px;display:flex;justify-content:center;gap:20px;"><a href="${appData.social.instagram}" target="_blank" rel="noopener" class="social-link" aria-label="Profilo Instagram @anconacentro">📷 Instagram</a><a href="${appData.social.facebook}" target="_blank" rel="noopener" class="social-link" aria-label="Pagina Facebook">📘 Facebook</a></div></div>
        <div class="emerg-card"><div class="card-header"><span class="card-header-icon" aria-hidden="true">🚨</span><span class="card-title">${tr('Numeri di emergenza', 'Emergency numbers', 'Notrufnummern', 'Numery alarmowe')}</span></div>
        <div class="emerg-row"><span class="emerg-num">🚨 112</span><span class="emerg-desc">${tr('Emergenza generale', 'General emergency', 'Allgemeiner Notruf', 'Ogólne zagrożenie')}</span></div>
        <div class="emerg-row"><span class="emerg-num">🚓 113</span><span class="emerg-desc">${tr('Polizia', 'Police', 'Polizei', 'Policja')}</span></div>
        <div class="emerg-row"><span class="emerg-num">🚑 118</span><span class="emerg-desc">${tr('Emergenza sanitaria', 'Medical emergency', 'Medizinischer Notfall', 'Nagły wypadek medyczny')}</span></div>
        <div class="emerg-row"><span class="emerg-num">🏥 071 5961</span><span class="emerg-desc">${tr('Ospedale Riuniti – Pronto Soccorso', 'Ospedale Riuniti – A&E', 'Ospedale Riuniti – Notaufnahme', 'Szpital Riuniti – Izba przyjęć')}</span></div>
        <div class="emerg-row"><span class="emerg-num">🚕 071 43321</span><span class="emerg-desc">Radiotaxi Ancona (24h)</span></div></div>
        <div class="card" style="margin-top:10px;"><div class="card-header"><span class="card-header-icon" aria-hidden="true">🔗</span><span class="card-title">${tr('Link utili', 'Useful links', 'Nützliche Links', 'Przydatne linky')}</span></div><div class="card-body" style="padding:0;">
        <div class="link-row"><span class="link-icon" aria-hidden="true">📰</span><div class="link-info"><div class="link-name">Edicola di Piazza Roma</div><div class="link-desc">${tr('Proprio davanti al portone', 'Right in front of the entrance', 'Direkt vor dem Eingang', 'Tuż przed wejściem')}</div></div><a href="${getMapLink('Edicola Piazza Roma Ancona', true)}" target="_blank" rel="noopener" class="link-action" aria-label="Mappa Edicola">🗺️ ${tr('Mappa', 'Map', 'Karte', 'Mapa')}</a></div>
        <div class="link-row"><span class="link-icon" aria-hidden="true">🌐</span><div class="link-info"><div class="link-name">anconatourism.it</div><div class="link-desc">${tr('Portale turistico ufficiale di Ancona', 'Official Ancona tourism portal', 'Offizielles Tourismusportal von Ancona', 'Oficjalny portal turystyczny Ankony')}</div></div><a href="https://anconatourism.it" target="_blank" rel="noopener" class="link-action" aria-label="Apri portale turistico">↗</a></div>
        <div class="link-row"><span class="link-icon" aria-hidden="true">👕</span><div class="link-info"><div class="link-name">Lavanderia self service</div><div class="link-desc">Via Matteotti 137</div></div><a href="${getMapLink('Lavanderia self service Via Matteotti 137 Ancona', true)}" target="_blank" rel="noopener" class="link-action" aria-label="Mappa Lavanderia">🗺️ ${tr('Mappa', 'Map', 'Karte', 'Mapa')}</a></div>
        </div></div>`;
    }

    function initSectionMap() {
        if (typeof L === 'undefined') { if (_mapRetryCount < 30) { _mapRetryCount++; setTimeout(initSectionMap, 300); } return; }
        _mapRetryCount = 0; const el = document.getElementById('sectionMap'); if (!el || !currentSectionPlaces.length) return;
        if (leafletMap) { leafletMap.remove(); leafletMap = null; }
        const valid = currentSectionPlaces.filter(p => p.lat && p.lng); if (!valid.length) return;
        leafletMap = L.map('sectionMap', { zoomControl: true, attributionControl: false });
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 19 }).addTo(leafletMap);
        L.control.attribution({ prefix: '© <a href="https://openstreetmap.org">OSM</a>' }).addTo(leafletMap);
        const bounds = [];
        valid.forEach((p, idx) => {
            const displayNum = getDisplayNumber(p, idx); let markerClass = 'map-marker-num';
            if (currentSubItinerary === 'cardeto' || currentSubItinerary === 'cittadella') markerClass += ' ' + currentSubItinerary;
            if (p.isSubItinerary) markerClass += ' has-sub';
            const icon = L.divIcon({ html: `<div class="${markerClass}" aria-label="${p.name}" role="img">${displayNum}</div>`, className: '', iconSize: [24, 24], iconAnchor: [12, 12], popupAnchor: [0, -14] });
            const m = L.marker([p.lat, p.lng], { icon: icon }).addTo(leafletMap);
            m.bindPopup(`<b style="font-size:.78rem;">${p.emoji} ${p.name}</b><br><span style="font-size:.68rem;color:#888;">${p.dist}</span>`);
            m.on('click', () => selectPlaceDetail(idx)); bounds.push([p.lat, p.lng]);
        });
        if (bounds.length) leafletMap.fitBounds(bounds, { padding: [22, 22] });
        const starIcon = L.divIcon({ html: '<div class="map-marker-star" aria-label="Ancona Centro" role="img">★</div>', className: '', iconSize: [28, 28], iconAnchor: [14, 14], popupAnchor: [0, -16] });
        L.marker([HOME_COORDS.lat, HOME_COORDS.lng], { icon: starIcon, zIndexOffset: 1000 }).addTo(leafletMap).bindPopup('<b style="font-size:.78rem;">★ Ancona Centro</b><br><span style="font-size:.68rem;color:#888;">📍 Piazza Roma 3</span>');
    }

    if ('serviceWorker' in navigator) window.addEventListener('load', () => { navigator.serviceWorker.register('./sw.js', { scope: './' }).catch(() => {}); });
    window.addEventListener('beforeinstallprompt', (e) => { e.preventDefault(); deferredPrompt = e; const installBtn = document.getElementById('install-btn'); if (installBtn) installBtn.style.display = 'inline-flex'; });
    window.addEventListener('appinstalled', () => { deferredPrompt = null; const installBtn = document.getElementById('install-btn'); if (installBtn) installBtn.style.display = 'none'; });
    if (window.matchMedia('(display-mode: standalone)').matches) { const installBtn = document.getElementById('install-btn'); if (installBtn) installBtn.style.display = 'none'; }
    window.addEventListener('load', () => { const hash = window.location.hash.replace('#', ''); if (hash && sectionHashMap[hash] !== undefined) goTo(sectionHashMap[hash]); });
    renderAll();
    setTimeout(updateGpsUI, 300);
    </script>
