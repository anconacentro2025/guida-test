<script>

function tr(it, en, pl) {
  if (currentLang === 'it') return it;
  if (currentLang === 'en') return en || it;
  if (currentLang === 'pl') return pl || it;
  return it;
}
function setLang(lang) {
  currentLang = lang;
  ['it', 'en', 'pl'].forEach(function (l) {
    document.getElementById('btn-' + l).classList.toggle('active', l === lang);
    document.getElementById('btn-' + l).setAttribute('aria-checked', l === lang ? 'true' : 'false');
  });
  renderAll();
}
function showToast(msg) {
  var el = document.getElementById('toastEl');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(function () { el.classList.remove('show'); }, 3000);
}
function getMapLink(query) {
  return 'https://www.google.com/maps/search/?api=1&query=' + encodeURIComponent(query + ', Ancona Italia');
}
function photoFallback(wrapId, name) {
  var el = document.getElementById(wrapId);

}

var appData = {
  checkin: 'da concordare / on request / do ustalenia',
  checkout: '11:00',

  rules: [
    { icon: '🚭', it: 'Vietato fumare in tutto l\'appartamento', en: 'No smoking anywhere in the apartment', pl: 'Zakaz palenia w całym mieszkaniu' },
    { icon: '🐾', it: 'Vietati gli animali domestici', en: 'No pets allowed', pl: 'Zakaz wprowadzania zwierząt domowych' }
  ],
  social: {
    instagram: 'https://www.instagram.com/anconacentro',
    facebook: 'https://www.facebook.com/profile.php?id=61575688633462'
  },
  mustsee: [
    { order: 1, name: 'Fontana del Calamo (13 Cannelle)', emoji: '⛲', photo: 'fontana-calamo.jpg', itinerario: 'centro',
      it: 'Antica fontana pubblica del XIII secolo, simbolo di Ancona. Dalla Fontana del Calamo, o delle 13 Cannelle come la chiamano gli anconetani, si scende lungo Corso Mazzini e si arriva a Piazza della Repubblica, dove si affaccia il Teatro delle Muse.',
      en: 'Ancient 13th-century public fountain, symbol of Ancona. From the Fontana del Calamo, or "13 Cannelle" as the locals call it, walk down Corso Mazzini to Piazza della Repubblica, where the Teatro delle Muse stands.',
      pl: 'Starożytna XIII-wieczna fontanna, symbol Ankony. Od Fontana del Calamo, czyli "13 Cannelle" jak nazywają ją miejscowi, schodzimy w dół Corso Mazzini i docieramy na Piazza della Repubblica, gdzie znajduje się Teatro delle Muse.',
      dist: '📍 0 m – Punto di partenza', mapQuery: 'Fontana delle 13 Cannelle Ancona', lat: 43.6184165, lng: 13.5129301 },
    { order: 2, name: 'Teatro delle Muse', emoji: '🎭', photo: 'teatro-muse.jpg', itinerario: 'centro',
      it: 'Teatro in stile neoclassico inaugurato nel 1827, danneggiato dalla seconda guerra mondiale e riaperto nel 2002. Dal Teatro delle Muse, prendendo via della Loggia, si arriva al Palazzo Benincasa e alla Loggia dei Mercanti.',

      dist: '🚶 350 m – 4 min', mapQuery: 'Teatro delle Muse Ancona', lat: 43.6192483, lng: 13.5099488 },
    { order: 3, name: 'Loggia dei Mercanti', emoji: '🏛️', photo: 'loggia-mercanti.jpg', itinerario: 'centro',
      it: 'Edificio quattrocentesco come Palazzo Benincasa, entrambi progettati da Giorgio da Sebenico. La loggia ospitava la compravendita delle merci che arrivavano in città dal porto. Proseguendo poco oltre per via della Loggia si arriva a Santa Maria della Piazza.',
      en: 'A 15th-century building like Palazzo Benincasa, both designed by Giorgio da Sebenico. The loggia hosted the trading of goods arriving in the city from the port. Continuing a little further along Via della Loggia you reach Santa Maria della Piazza.',
      pl: 'XV-wieczny budynek, podobnie jak Palazzo Benincasa, oba zaprojektowane przez Giorgio da Sebenico. Loggia służyła do handlu towarami przybywającymi do miasta z portu. Idąc nieco dalej wzdłuż Via della Loggia, docieramy do Santa Maria della Piazza.',
      dist: '🚶 400 m – 5 min', mapQuery: 'Loggia dei Mercanti Ancona', lat: 43.6199818, lng: 13.5098563 },
    { order: 4, name: 'Santa Maria della Piazza', emoji: '⛪', photo: 'santa-maria-piazza.jpg', itinerario: 'centro',
      it: 'Eretta tra l\'XI e il XII secolo, è un notevole esempio di stile romanico. Essa fu costruita su una chiesa paleocristiana del IV secolo restaurata nel VI; una parte del pavimento della chiesa attuale è in vetro per permettere la visione dei mosaici paleocristiani sottostanti. Si accede al porto dalla Portella Santa Maria, collocata proprio di fronte alla chiesa. Svoltando a destra dopo 300 metri si raggiunge l\'Arco di Traiano.',
      en: 'Built between the 11th and 12th centuries, it is a remarkable example of Romanesque style. It was constructed over a 4th-century early Christian church restored in the 6th century; part of the current church floor is made of glass to allow a view of the early Christian mosaics underneath. Access to the port is from Portella Santa Maria, located right opposite the church. Turning right after 300 metres you reach the Arch of Trajan.',
      pl: 'Zbudowany między XI a XII wiekiem, jest to wybitny przykład stylu romańskiego. Został wzniesiony na miejscu wczesnochrześcijańskiego kościoła z IV wieku, odrestaurowanego w VI wieku; część obecnej podłogi kościoła jest szklana, aby umożliwić oglądanie wczesnochrześcijańskich mozaik znajdujących się poniżej. Do portu wchodzi się przez Portella Santa Maria, znajdującą się dokładnie naprzeciwko kościoła. Skręcając w prawo po 300 metrach docieramy do Łuku Trajana.',
      dist: '🚶 400 m – 5 min', mapQuery: 'Santa Maria della Piazza Ancona', lat: 43.6205592, lng: 13.5103676 },
    { order: 5, name: 'Arco di Traiano', emoji: '🏛️', photo: 'arco-traiano.jpg', itinerario: 'centro',
      it: 'Entrando in porto dalla Portella Santa Maria, svoltando a destra dopo 300 metri si raggiunge l\'Arco di Traiano, arco trionfale fatto costruire nel II secolo d.C. dal Senato romano per esprimere la propria riconoscenza all\'imperatore Traiano il quale aveva ampliato il porto di Ancona a proprie spese. Poco più avanti l\'Arco Clementino.',
      en: 'Entering the port from Portella Santa Maria, turn right and after 300 metres you reach the Arch of Trajan, a triumphal arch built in the 2nd century AD by the Roman Senate to express gratitude to Emperor Trajan, who had enlarged the port of Ancona at his own expense. A little further on, the Arco Clementino.',
      pl: 'Wchodząc do portu od Portella Santa Maria, skręcając w prawo po 300 metrach docieramy do Łuku Trajana, łuku triumfalnego wzniesionego w II wieku n.e. przez rzymski Senat, aby wyrazić wdzięczność cesarzowi Trajanowi, który na własny koszt rozbudował port w Ankonie. Nieco dalej Łuk Klementyński.',
      dist: '🚶 1150 m – 16 min', mapQuery: 'Arco di Traiano Ancona', lat: 43.6252706, lng: 13.5066018 },
    { order: 6, name: 'Arco Clementino', emoji: '🚪', photo: 'arco-clementino.jpg', itinerario: 'centro',
      it: 'Monumento progettato nel XVIII secolo dall\'architetto Luigi Vanvitelli sotto forma di arco di trionfo a un solo fornice, in pietra d\'Istria, in onore di Papa Clemente XII che concesse alla città il "porto franco" dando un notevole impulso ai traffici marittimi.',
      en: 'Monument designed in the 18th century by the architect Luigi Vanvitelli as a single-fornix triumphal arch in Istrian stone, in honour of Pope Clement XII, who granted the city "free port" status, giving a significant boost to maritime traffic.',
      pl: 'Monument zaprojektowany w XVIII wieku przez architekta Luigiego Vanvitellego jako jednoprzęsłowy łuk triumfalny z kamienia istryjskiego, na cześć papieża Klemensa XII, który przyznał miastu status "wolnego portu", dając znaczący impuls dla ruchu morskiego.',
      dist: '🚶 1250 m – 17 min', mapQuery: 'Arco Clementino Ancona', lat: 43.6252604, lng: 13.5049529 },
    { order: '6-bis', name: 'Lanterna Rossa (facoltativo)', emoji: '🗼', photo: 'lanterna-rossa.jpg', itinerario: 'centro',
      it: '(Facoltativo) Per chi vuole allungare, andando poco avanti sulla destra si apre un varco nelle mura. Proseguendo si arriva alla torre dei piloti del porto. Dietro di essa, poco visibile, si apre un piccolo varco nelle mura che conduce ad un molo in fondo al quale è collocata la lanterna rossa del porto. Salendo per una scaletta si raggiunge la cima del muro dal quale si gode uno splendido panorama sulla città e su tutta la costa.',
      en: '(Optional) For those who want to extend the walk, just ahead on the right there is a gap in the walls. Continuing, you reach the harbour pilots\' tower. Behind it, barely visible, a small opening in the walls leads to a pier at the end of which stands the red harbour lantern. Climbing a short staircase you reach the top of the wall, from which you can enjoy a splendid view of the city and the entire coast.',
      pl: '(Opcjonalnie) Dla tych, którzy chcą wydłużyć spacer, nieco dalej po prawej stronie znajduje się przejście w murach. Kontynuując, docieramy do wieży pilotów portowych. Za nią, ledwo widoczne, małe przejście w murach prowadzi na molo, na końcu którego znajduje się czerwona latarnia portowa. Wspinając się po krótkich schodkach, można dotrzeć na szczyt muru, skąd rozciąga się wspaniały widok na miasto i całe wybrzeże.',
      dist: '🚶 2200 m – 29 min', mapQuery: 'Lanterna Rossa Ancona', lat: 43.6255485, lng: 13.4942123 },
    { order: 7, name: 'Resti del Porto Romano (II sec. a.C.)', emoji: '🏛️', photo: 'porto-romano.jpg', itinerario: 'centro',
      it: 'Tornando indietro verso la città passando proprio sotto le pendici del colle Guasco si arriva ad una passerella che passa sui resti dell\'antico porto romano. Sulla destra la Casa del Capitano del porto del XIII sec. Proseguendo si raggiunge largo Dante Alighieri, su cui si affaccia l\'imponente Palazzo degli Anziani.',
      en: 'Heading back towards the city, passing right under the slopes of the Guasco hill, you reach a walkway that passes over the remains of the ancient Roman port. On the right, the 13th-century Harbour Master\'s House. Continuing, you reach Largo Dante Alighieri, where the imposing Palazzo degli Anziani stands.',
      pl: 'Wracając w kierunku miasta, przechodząc tuż pod zboczami wzgórza Guasco, docieramy do kładki, która przechodzi nad pozostałościami starożytnego portu rzymskiego. Po prawej stronie Dom Kapitana Portu z XIII wieku. Idąc dalej, docieramy do Largo Dante Alighieri, przy którym stoi okazały Palazzo degli Anziani.',
      dist: '🚶 800 m – 11 min', mapQuery: 'Porto Traianeo Ancona', lat: 43.6235224, lng: 13.509572 },
    { order: 8, name: 'Palazzo degli Anziani e Ascensore', emoji: '🏛️', photo: 'palazzo-anziani.jpg', itinerario: 'centro',
      it: 'Sulla sinistra ascensore (con accesso a bagni pubblici) che porta fino a piazza Stracca, dove si trova l\'ingresso dell\'edificio. Sede storica delle Magistrature cittadine sin dall\'Alto Medioevo e a partire dall\'XI secolo, con la nascita della Repubblica di Ancona, luogo dove si riuniva il Consiglio degli Anziani, da cui prende il nome. Il Palazzo vanta origini antichissime e travagliate con la sua Costruzione attribuita a Galla Placidia (governatrice dell\'impero) nel 425 d.C. L\'edificio attuale venne eretto nel 1270 su disegno di Margaritone d\'Arezzo e poi ristrutturato nel XVI sec. da Pellegrino Tibaldi. È attualmente sede del Consiglio comunale di Ancona. Continuando in leggera salita per via Pizzecolli si arriva a Palazzo Ferretti, sede del Museo Archeologico Nazionale delle Marche.',
      en: 'On the left, a lift (with access to public toilets) takes you up to Piazza Stracca, where the entrance to the building is located. Historic seat of the city magistrates since the Early Middle Ages and, from the 11th century with the birth of the Republic of Ancona, meeting place of the Council of Elders (Consiglio degli Anziani), from which it takes its name. The palace boasts ancient and troubled origins, with its construction attributed to Galla Placidia (governor of the empire) in 425 AD. The current building was erected in 1270 to a design by Margaritone d\'Arezzo and later renovated in the 16th century by Pellegrino Tibaldi. It is now the seat of Ancona\'s City Council. Continuing slightly uphill along Via Pizzecolli you reach Palazzo Ferretti, home of the National Archaeological Museum of the Marche.',
      pl: 'Po lewej stronie winda (z dostępem do toalet publicznych) prowadzi na Piazza Stracca, gdzie znajduje się wejście do budynku. Historyczna siedziba miejskich magistratur od wczesnego średniowiecza, a od XI wieku, wraz z narodzinami Republiki Ankony, miejsce obrad Rady Starszych (Consiglio degli Anziani), od której pochodzi jego nazwa. Pałac ma starożytne i burzliwe dzieje – jego budowę przypisuje się Galli Placydii (namiestniczce cesarstwa) w 425 r. n.e. Obecny budynek wzniesiono w 1270 roku według projektu Margaritone d\'Arezzo, a następnie przebudowano w XVI wieku przez Pellegrina Tibaldiego. Obecnie jest siedzibą Rady Miejskiej Ankony. Kontynuując lekkim wzniesieniem wzdłuż Via Pizzecolli, docieramy do Palazzo Ferretti, siedziby Narodowego Muzeum Archeologicznego Marchii.',
      dist: '🚶 650 m – 9 min', mapQuery: 'Palazzo degli Anziani Ancona', lat: 43.6226783, lng: 13.5105215, extraMap: { label: '⬆️ Ascensore San Ciriaco', query: 'Ascensore San Ciriaco Ancona' } },
    { order: 9, name: 'Museo Archeologico Nazionale delle Marche (MANM)', emoji: '🏺', photo: 'museo-archeologico.jpg', itinerario: 'centro',
      it: 'Palazzo cinquecentesco dei conti Ferretti con sale affrescate dal Tibaldi, sede del museo archeologico nazionale delle marche con ricchissima collezione di reperti dal paleolitico al periodo ellenistico romano. Proseguendo si passa davanti al Palazzo del Senato del XIII sec. per continuare per una scalinata che porta fino al Duomo.',
      en: '16th-century palace of the Ferretti counts with frescoed halls by Tibaldi, home of the National Archaeological Museum of the Marche with a rich collection of finds from the Palaeolithic to the Hellenistic-Roman period. Continuing, you pass the 13th-century Palazzo del Senato and then take a staircase leading up to the Cathedral.',
      pl: 'XVI-wieczny pałac hrabiów Ferretti z salami ozdobionymi freskami przez Tibaldiego, siedziba Narodowego Muzeum Archeologicznego Marchii z bogatą kolekcją znalezisk od paleolitu po okres hellenistyczno-rzymski. Idąc dalej, mijamy XIII-wieczny Palazzo del Senato, a następnie schodami prowadzącymi do Katedry.',
      dist: '🚶 750 m – 10 min', mapQuery: 'Museo Archeologico Nazionale Ancona', lat: 43.6234656, lng: 13.5109808 },
    { order: 10, name: 'Cattedrale di San Ciriaco', emoji: '⛪', photo: 'duomo-san-ciriaco.jpg', itinerario: 'centro',
      it: 'La Cattedrale di San Ciriaco, che rappresenta l\'emblema di Ancona, sorge sull\'antico tempio dedicato a Venere Euplea, protettrice della navigazione, di cui restano parte delle fondamenta. Su di esso, nel VI secolo d.C., venne costruita la basilica paleocristiana dedicata a San Lorenzo, che divenne Cattedrale nel 1000 quando vi furono traslati i corpi di San Ciriaco e San Marcellino. Spettacolare panorama sulla città. A sinistra della facciata il Museo Diocesano, scendendo sulla destra si arriva ai resti dell\'Anfiteatro romano.',
      en: 'The Cathedral of San Ciriaco, the emblem of Ancona, stands on the ancient temple dedicated to Venus Euplea, protector of navigation, of which part of the foundations remain. On it, in the 6th century AD, the early Christian basilica dedicated to San Lorenzo was built, which became the Cathedral in the year 1000 when the bodies of Saint Cyriacus and Saint Marcellinus were transferred there. Spectacular view over the city. To the left of the façade the Diocesan Museum; descending to the right you reach the remains of the Roman Amphitheatre.',
      pl: 'Katedra San Ciriaco, która jest symbolem Ankony, wznosi się na starożytnej świątyni poświęconej Wenus Euplea, opiekunce żeglugi, z której zachowała się część fundamentów. Na niej, w VI wieku n.e., zbudowano wczesnochrześcijańską bazylikę pod wezwaniem San Lorenzo, która stała się katedrą w roku 1000, kiedy przeniesiono tam ciała świętego Cyriaka i świętego Marcellina. Spektakularny widok na miasto. Na lewo od fasady Muzeum Diecezjalne; schodząc w prawo, docieramy do pozostałości rzymskiego Amfiteatru.',
      dist: '🚶 1000 m – 13 min', mapQuery: 'Cattedrale di San Ciriaco Ancona', lat: 43.6251216, lng: 13.510037 },
    { order: 11, name: 'Anfiteatro Romano', emoji: '🏟️', photo: 'anfiteatro-romano.jpg', itinerario: 'centro',
      it: 'Anfiteatro realizzato in età augustea (I sec. a.C.) presentava una cavea sviluppata su oltre venti gradinate disposte su tre ordini e poteva accogliere fino a 10.000 spettatori. Dopo l\'abbandono in età antica (IV sec. d.C.) venne utilizzato come cava di materiali e, a partire dal XIII secolo, come base per nuove costruzioni che ne hanno nascosto la struttura. Solo nel 1810 si identificò nella volta della cantina del conte Bonarelli uno degli ingressi principali del monumento poi riportato alla luce a partire dagli anni 70. Tornando in discesa verso piazza del Senato si possono ammirare degli splendidi mosaici. Scendendo per via Pizzecolli si torna in piazza Stracca dove, di fronte alla facciata del Palazzo degli Anziani si erge la maestosa chiesa del Gesù progettata dal Vanvitelli.',
      en: 'Amphitheatre built in the Augustan age (1st century BC) featuring a cavea of over twenty tiers arranged in three orders, capable of holding up to 10,000 spectators. After its abandonment in ancient times (4th century AD), it was used as a quarry for building materials and, from the 13th century, as a foundation for new constructions that concealed its structure. Only in 1810 was one of the main entrances identified in the vault of Count Bonarelli\'s cellar; the monument was then brought to light from the 1970s onwards. Heading back down towards Piazza del Senato, you can admire some splendid mosaics. Descending Via Pizzecolli you return to Piazza Stracca where, opposite the façade of Palazzo degli Anziani, stands the majestic Chiesa del Gesù designed by Vanvitelli.',
      pl: 'Amfiteatr zbudowany w epoce augustiańskiej (I w. p.n.e.) posiadał widownię o ponad dwudziestu rzędach rozmieszczonych na trzech poziomach i mógł pomieścić do 10 000 widzów. Po opuszczeniu w starożytności (IV w. n.e.) był wykorzystywany jako kamieniołom, a od XIII wieku jako podstawa dla nowych budowli, które ukryły jego strukturę. Dopiero w 1810 roku w piwnicy hrabiego Bonarelli zidentyfikowano jedno z głównych wejść do monumentu, który następnie został odsłonięty od lat 70. XX wieku. Schodząc z powrotem w kierunku Piazza del Senato, można podziwiać wspaniałe mozaiki. Idąc w dół Via Pizzecolli, wracamy na Piazza Stracca, gdzie naprzeciwko fasady Palazzo degli Anziani wznosi się majestatyczny kościół del Gesù zaprojektowany przez Vanvitellego.',
      dist: '🚶 900 m – 12 min', mapQuery: 'Anfiteatro Romano Ancona', lat: 43.6247408, lng: 13.5117513 },
    { order: 12, name: 'Chiesa del Gesù', emoji: '⛪', photo: 'chiesa-gesu.jpg', itinerario: 'centro',
      it: 'Monumento commissionato dal conte Nappi nel 1605. Nel 1733 i Gesuiti affidarono a Luigi Vanvitelli il progetto dell\'ampliamento della chiesa. Continuando a scendere per via Pizzecolli, una delle più antiche vie della città, si raggiunge piazza San Francesco, ove si erge l\'omonima chiesa.',
      en: 'Monument commissioned by Count Nappi in 1605. In 1733 the Jesuits entrusted Luigi Vanvitelli with the project for the enlargement of the church. Continuing down Via Pizzecolli, one of the oldest streets in the city, you reach Piazza San Francesco, where the church of the same name stands.',
      pl: 'Monument zamówiony przez hrabiego Nappi w 1605 roku. W 1733 roku Jezuici powierzyli Luigiemu Vanvitellemu projekt rozbudowy kościoła. Kontynuując w dół Via Pizzecolli, jedną z najstarszych ulic miasta, docieramy do Piazza San Francesco, gdzie wznosi się kościół o tej samej nazwie.',
      dist: '🚶 600 m – 8 min', mapQuery: 'Chiesa del Gesù Ancona', lat: 43.6226099, lng: 13.5111676 },
    { order: 13, name: 'San Francesco alle Scale', emoji: '⛪', photo: 'san-francesco-scale.jpg', itinerario: 'centro',
      it: 'Dall\'alto di una gradinata, la Chiesa di San Francesco delle Scale prospetta su Piazza San Francesco, con un notevole effetto scenografico. Facciata con magnifico portale gotico-veneziano a forma di tabernacolo, realizzato in pietra di Brioni da Giorgio da Sebenico, alla metà del Quattrocento (1455). All\'interno opere notevoli, dal Lotto a Tibaldi. Scendendo per via Pizzecolli si arriva alla Pinacoteca civica.',
      en: 'From the top of a flight of steps, the Church of San Francesco delle Scale overlooks Piazza San Francesco, with a remarkable scenic effect. Façade with a magnificent Venetian-Gothic tabernacle-shaped portal, made of Brioni stone by Giorgio da Sebenico in the mid-15th century (1455). Inside, notable works from Lotto to Tibaldi. Descending Via Pizzecolli you reach the Civic Art Gallery (Pinacoteca civica).',
      pl: 'Ze szczytu schodów kościół San Francesco delle Scale góruje nad Piazza San Francesco, tworząc niezwykły efekt scenograficzny. Fasada ze wspaniałym wenecko-gotyckim portalem w kształcie tabernakulum, wykonanym z kamienia z Brioni przez Giorgio da Sebenico w połowie XV wieku (1455). We wnętrzu znakomite dzieła, od Lotta po Tibaldiego. Schodząc Via Pizzecolli, docieramy do Pinakoteki Miejskiej (Pinacoteca civica).',
      dist: '🚶 450 m – 6 min', mapQuery: 'Chiesa di San Francesco alle Scale Ancona', lat: 43.6214786, lng: 13.5118841 },
    { order: 14, name: 'Pinacoteca Civica F. Podesti', emoji: '🖼️', photo: '', itinerario: 'centro',
      it: 'Pinacoteca civica con opere di importanti autori tra cui Tiziano, Lotto, Crivelli, Guercino. Continuando si passa per il cinquecentesco Arco del Rastrello e si arriva in Piazza del Plebiscito.',
      en: 'Civic art gallery with works by important artists including Titian, Lotto, Crivelli, Guercino. Continuing, you pass through the 16th-century Arco del Rastrello and reach Piazza del Plebiscito.',
      pl: 'Miejska pinakoteka z dziełami ważnych artystów, m.in. Tycjana, Lotta, Crivellego, Guercina. Idąc dalej, przechodzimy przez XVI-wieczny Arco del Rastrello i docieramy na Piazza del Plebiscito.',
      dist: '🚶 300 m – 4 min', mapQuery: 'Pinacoteca Civica Podesti Ancona', lat: 43.6208333, lng: 13.5122222 },
    { order: 15, name: 'Piazza del Plebiscito', emoji: '⛲', photo: 'piazza-plebiscito.jpg', itinerario: 'centro',
      it: 'Nata come Piazza Nuova, le sue dimensioni la fecero subito ribattezzare Piazza Grande sino al 1860, anno in cui prende il nome dell\'attuale Piazza del Plebiscito, notoriamente chiamata Piazza del Papa per la presenza della statua Clemente XII. Su di essa si affaccia il Palazzo del Governo, sede della Prefettura, la chiesa di San Domenico e importanti palazzi storici. Oggi resta il centro nevralgico della parte antica della città e importante luogo di vita notturna e sociale di Ancona. Passando per la caratteristica via degli Orefici si torna in Corso Mazzini ed alla Fontana delle 13 Cannelle.',
      en: 'Originally called Piazza Nuova, its size soon earned it the name Piazza Grande until 1860, when it took its current name Piazza del Plebiscito, popularly known as Piazza del Papa due to the statue of Clement XII. It is overlooked by the Palazzo del Governo, seat of the Prefecture, the church of San Domenico and important historic buildings. Today it remains the nerve centre of the old part of the city and an important venue for Ancona\'s nightlife and social life. Passing through the characteristic Via degli Orefici you return to Corso Mazzini and the Fontana delle 13 Cannelle.',
      pl: 'Pierwotnie nazwany Piazza Nuova, jego rozmiary szybko sprawiły, że przemianowano go na Piazza Grande aż do 1860 roku, kiedy to otrzymał obecną nazwę Piazza del Plebiscito, powszechnie zwanego Piazza del Papa ze względu na posąg Klemensa XII. Znajduje się przy nim Palazzo del Governo, siedziba Prefektury, kościół San Domenico oraz ważne historyczne pałace. Dziś pozostaje nerwowym centrum starej części miasta i ważnym miejscem życia nocnego i towarzyskiego Ankony. Przechodząc przez charakterystyczną Via degli Orefici, wracamy na Corso Mazzini i do Fontanny 13 Cannelle.',
      dist: '🚶 200 m – 3 min', mapQuery: 'Piazza del Plebiscito Ancona', lat: 43.6195337, lng: 13.511651 },
    { order: 16, name: 'Parco del Cardeto', emoji: '🌳', photo: '', itinerario: 'centro', isSubItinerary: true, subId: 'cardeto',
      it: 'Parco cittadino di 35 ettari inaugurato nel 2005. Precedentemente zona militare. Al suo interno diverse aree ricche di storia.',
      en: 'A 35-hectare city park inaugurated in 2005. Formerly a military area, it contains several areas rich in history.',
      pl: 'Park miejski o powierzchni 35 hektarów, otwarty w 2005 roku. Dawniej teren wojskowy, obecnie zawiera liczne obszary bogate w historię.',
      dist: '🌳 Parco cittadino', mapQuery: 'Parco del Cardeto Ancona', lat: 43.6222659, lng: 13.5207122 },
    { order: 17, name: 'Porta Pia', emoji: '🚪', photo: 'porta-pia.jpg', itinerario: 'centro',
      it: 'Dal Teatro delle Muse, se invece di andare a destra verso la Loggia dei Mercanti si prende a sinistra e si percorre il lungomare Vanvitelli, in breve si arriva a Porta Pia. Antica porta monumentale di accesso alla città di Ancona realizzata dall\'architetto Filippo Marchionni tra il 1787 e il 1789 su richiesta di Papa Pio VI di realizzare una nuova strada "a mare" che evitasse lo scavalcamento disagevole del sovrastante colle Astagno.',
      en: 'From the Teatro delle Muse, if instead of going right towards the Loggia dei Mercanti you turn left and follow the Vanvitelli promenade, you soon reach Porta Pia. Ancient monumental gateway to the city of Ancona, designed by architect Filippo Marchionni between 1787 and 1789 at the request of Pope Pius VI, who wanted a new "sea road" to avoid the difficult climb over the Astagno hill.',
      pl: 'Od Teatro delle Muse, jeśli zamiast skręcać w prawo w kierunku Loggia dei Mercanti, skręcimy w lewo i pójdziemy wzdłuż promenady Vanvitellego, wkrótce dotrzemy do Porta Pia. Starożytna monumentalna brama wjazdowa do Ankony, zaprojektowana przez architekta Filippa Marchionniego w latach 1787–1789 na prośbę papieża Piusa VI, który chciał nowej „drogi morskiej”, aby uniknąć trudnej wspinaczki na wzgórze Astagno.',
      dist: '🚶 950 m – 13 min', mapQuery: 'Porta Pia Ancona', lat: 43.6152484, lng: 13.5048966 },
    { order: 18, name: 'Mole Vanvitelliana', emoji: '🏛️', photo: 'mole-vanvitelliana.jpg', itinerario: 'centro',
      it: 'Affacciandosi dalla balaustra del lungomare si può ammirare il suo ingresso principale. Vero e proprio capolavoro di edilizia ed ingegneria sull\'acqua, la Mole vanvitelliana è un lazzaretto costruito da Luigi Vanvitelli tra il 1733 e 1743. Sorge su di un\'isola artificiale pentagonale situata all\'interno del porto; oggi è collegato alla terraferma da tre ponti, ed occupa una superficie di 20.000 m². Attualmente al suo interno vi sono ampi spazi espositivi e il Museo Tattile Statale Omero.',
      en: 'Leaning over the seafront balustrade you can admire its main entrance. A true masterpiece of architecture and engineering on water, the Mole Vanvitelliana is a lazaretto built by Luigi Vanvitelli between 1733 and 1743. It stands on a pentagonal artificial island inside the port; today it is connected to the mainland by three bridges and covers an area of 20,000 m². Inside, it now houses large exhibition spaces and the Museo Tattile Statale Omero.',
      pl: 'Wychylając się z balustrady nadmorskiej promenady, można podziwiać jej główne wejście. Prawdziwe arcydzieło architektury i inżynierii na wodzie, Mole Vanvitelliana to lazaret zbudowany przez Luigiego Vanvitelliego w latach 1733–1743. Wznosi się na sztucznej pięciokątnej wyspie wewnątrz portu; dziś jest połączona z lądem trzema mostami i zajmuje powierzchnię 20 000 m². Obecnie mieszczą się w niej duże przestrzenie wystawowe i Museo Tattile Statale Omero.',
      dist: '🚶 1100 m – 14 min', mapQuery: 'Mole Vanvitelliana Ancona', lat: 43.6143735, lng: 13.504058, extraMap: { label: '🖐️ Museo Tattile Omero', query: 'Museo Tattile Statale Omero Ancona' } },
    { order: 19, name: 'Fortezza e Parco della Cittadella', emoji: '🏰', photo: '', itinerario: 'centro', isSubItinerary: true, subId: 'cittadella',
      it: 'Nel quartiere Capodimonte, sulla sommità del colle Astagno e per opera dell\'architetto Antonio da Sangallo il Giovane (1484 – 1546), sorge "La Cittadella", un\'edificazione militare rinascimentale realizzata nel 1532 che si affaccia sulla città e sul porto. All\'interno dell\'antico campo trincerato si trova il Parco della Cittadella.',
      en: 'In the Capodimonte district, on the summit of the Astagno hill, stands "La Cittadella", a Renaissance military fortification built in 1532 by the architect Antonio da Sangallo the Younger (1484 – 1546), overlooking the city and the port. Inside the ancient entrenched field lies the Parco della Cittadella.',
      pl: 'W dzielnicy Capodimonte, na szczycie wzgórza Astagno, wznosi się "La Cittadella" – renesansowa fortyfikacja wojskowa zbudowana w 1532 roku przez architekta Antonia da Sangallo Młodszego (1484 – 1546), z widokiem na miasto i port. Wewnątrz starożytnego obozu warownego znajduje się Parco della Cittadella.',
      dist: '🚶 800 m – 11 min', mapQuery: 'Fortezza della Cittadella Ancona', lat: 43.6138415, lng: 13.5080277 },
    { order: 20, name: 'Passetto', emoji: '🌊', photo: 'passetto.jpg', itinerario: 'centro',
      it: 'Salendo da Corso Garibaldi e poi, dopo aver attraversato piazza Cavour, percorrendo tutto il viale della Vittoria, si arriva al Passetto. Da lontano si può vedere "il monumento" come lo chiamano gli anconetani, ammirare il panorama dall\'ascensore, o scendere per la scalinata monumentale per ammirare le caratteristiche grotte e fare il bagno.',
      en: 'Going up Corso Garibaldi and then, after crossing Piazza Cavour, walking all along Viale della Vittoria, you reach the Passetto. From afar you can see "the monument" as the locals call it, admire the view from the lift, or go down the monumental staircase to see the characteristic grottoes and take a swim.',
      pl: 'Wchodząc pod górę Corso Garibaldi, a następnie, po przejściu przez Piazza Cavour, idąc całą aleją Viale della Vittoria, docieramy do Passetto. Z daleka widać "pomnik", jak nazywają go miejscowi, można podziwiać panoramę z windy lub zejść monumentalnymi schodami, aby zobaczyć charakterystyczne groty i wykąpać się.',
      dist: '🚶 2150 m – 29 min', mapQuery: 'Spiaggia del Passetto Ancona', lat: 43.616139, lng: 13.533622 }
  ],

function initSectionMap() {
  if (typeof L === 'undefined') { setTimeout(initSectionMap, 300); return; }
  var el = document.getElementById('sectionMap');
  if (!el || !currentSectionPlaces.length) return;
  if (leafletMap) { leafletMap.remove(); leafletMap = null; }
  var valid = currentSectionPlaces.filter(function (p) { return p.lat && p.lng; });
  if (!valid.length) return;
  leafletMap = L.map('sectionMap', { zoomControl: true, attributionControl: false });
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 19 }).addTo(leafletMap);
  L.control.attribution({ prefix: '© <a href="https://openstreetmap.org">OSM</a>' }).addTo(leafletMap);
  var bounds = [];
  valid.forEach(function (p, idx) {
    var displayNum = getDisplayNumber(p, idx);
    var markerClass = 'map-marker-num';
    if (currentSubItinerary === 'cardeto' || currentSubItinerary === 'cittadella') markerClass += ' ' + currentSubItinerary;
    var icon = L.divIcon({
      html: '<div class="' + markerClass + '" aria-label="' + p.name + '">' + displayNum + '</div>',
      className: '', iconSize: [24, 24], iconAnchor: [12, 12], popupAnchor: [0, -14]
    });
    var m = L.marker([p.lat, p.lng], { icon: icon }).addTo(leafletMap);
    m.bindPopup('<b style="font-size:.78rem;">' + p.emoji + ' ' + p.name + '</b><br><span style="font-size:.68rem;color:#888;">' + p.dist + '</span>');
    m.on('click', function () { selectPlaceDetail(idx); });
    bounds.push([p.lat, p.lng]);
  });
  leafletMap.fitBounds(bounds, { padding: [22, 22] });
}
function getDisplayNumber(p, index) {
  if (currentSubItinerary) {
    return String.fromCharCode(65 + index); // A, B, C, ...
  }
  if (typeof p.order === 'string' && p.order.indexOf('bis') > -1) {
    return p.order;
  }
  return index + 1;
}
function getTotalDisplay(items, total) {
  if (currentSubItinerary) {
    return String.fromCharCode(64 + total);
  }
  var last = items[total - 1];
  if (last && typeof last.order === 'string' && last.order.indexOf('bis') > -1) {
    return last.order;
  }
  return total;
}
function sortMustSee(a, b) {
  function toNum(val) {
    if (typeof val === 'string' && val.indexOf('bis') > -1) {
      return parseFloat(val.split('-')[0]) + 0.5;
    }
    return Number(val);
  }
  return toNum(a.order) - toNum(b.order);
}
